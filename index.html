              // When the schema is fully crowded (buffer ON + upstream reducer + rack), there is
              // not enough horizontal room for all four elements + arrows; in that single case we
              // omit the rack from the schema (the cylinder data still appears in the Output Data
              // table below, so no information is lost).
              // Rack appears in PDF schema for BON2 (any pressure) and BM > 48 bar (cylApplies),
              // when fill calculation is active and the schema is not over-crowded.
              const showRackPDF = cylApplies && cylFill != null && !(bf && effectiveBufferOn && hasReducer);
              // BM ≤48 bar with the storage add-on enabled → draw a delivery
              // tank downstream of the booster.  Mutually exclusive with
              // showRackPDF (different family / pressure regime).
              const showDlvPDF = dlvApplies && dlvTank != null && !showRackPDF;
              // Booster size — respect actual image aspect (~0.768 W/H) to avoid stretching.
              const imgW2 = (showRackPDF || showDlvPDF) ? 17 : 19;
              const imgH2 = (showRackPDF || showDlvPDF) ? 22 : 25;
              const rackW = 20, rackH = 24;
              // Delivery-tank PDF dims — match the on-screen tankSvg aspect (38×78
              // → ≈0.49 W/H).  Slightly slimmer than the cylinder rack.
              const dlvTankW_PDF = 14, dlvTankH_PDF = 28;
              // === LAYOUT MODEL ===
              // When rack is shown, the booster output labels (pOut + FAD) are placed INLINE
              // between booster→rack (those data are booster output, not rack output), and
              // the right-side label panel is suppressed.  Arrows between elements are
              // equispaced for a clean printed schema.
              // Inline labels REMOVED — the booster→rack arrow is now continuous with
              // pOut + FAD printed ABOVE the arrow (no longer split mid-flow).  This
              // also frees ≈22 mm of horizontal budget, which we redistribute to (a)
              // a longer arrow1 starting at the left labels, (b) more room between
              // tank and booster (avvio/arresto labels no longer overlap booster).
              const inlineLblW = 0;
              // Edge gap collapses to 2 mm whenever a downstream element (rack
              // or delivery tank) is drawn — the element itself sits flush.
              const rightLblGap = (showRackPDF || showDlvPDF) ? 2 : 22;
              // Single generous span for booster→rack/tank (labels above need ≈28 mm).
              const rackArrowSpan = 30;
              const dlvArrowSpan  = 30;   // same span for symmetry with rack
              const minArrowGap   = showRackPDF ? rackArrowSpan
                                  : showDlvPDF  ? dlvArrowSpan
                                  : 8;

              // Booster X (anchor for right-side cluster).
              //   showRackPDF: booster + ar (continuous, labels above) + rack + edge
              //   showDlvPDF : booster + ar (continuous, labels above) + tank + edge
              //   legacy     : booster + arrow + rightLbl
              const boosterX = showRackPDF
                ? (schX + schW - rightLblGap - rackW         - minArrowGap - imgW2)
                : showDlvPDF
                ? (schX + schW - rightLblGap - dlvTankW_PDF  - minArrowGap - imgW2)
                : (schX + schW - rightLblGap - 4 - imgW2 - 16);

              // === Arrow 1: from left labels to first downstream element (buffer / PR / booster) ===
              // ar1L pulled left to schX+24 (was schX+36) so the arrow visually starts
              // right after "6 barg / 100 m³/h" — no more floating gap.
              doc.setDrawColor(232,93,46); doc.setLineWidth(0.6);
              const ar1L = schX+24;
              const tankW2 = 15, tankH = 28;
              // Tank moved left for the rack+buffer regime (was schX+46) so the avvio/
              // arresto labels above ar2 have ≥40 mm of clear span — booster image no
              // longer overlaps them.  Other regimes keep the original schX+46 anchor.
              const tankX = (showRackPDF && bf && effectiveBufferOn)
                ? Math.max(schX + 40, boosterX - 55)
                : schX + 46;
              const ar1R = (bf && effectiveBufferOn) ? tankX - 2 : boosterX - prReserve - 2;
              doc.line(ar1L, midY, ar1R-4, midY);
              doc.triangle(ar1R-4,midY-2, ar1R,midY, ar1R-4,midY+2, 'F');

              // Buffer tank — uses the shared drawTankPDF helper so the PDF
              // matches the on-screen tankSvg exactly (top cap + body + bottom
              // cap + dashed gauge + central fill ellipse).  Per user request:
              // "metti lo stesso disegno del buffer che vedo nell'app".
              if (bf && effectiveBufferOn) {
                const tankY = midY - tankH/2;
                drawTankPDF(doc, tankX, tankY, tankW2, tankH, /*withFill*/ true);

                // Arrow2: from tank to reducer (or booster).
                // Length ≈ 28 mm, leaving room for the avvio/arresto cycle labels above it.
                const ar2L = tankX+tankW2+2, ar2R = boosterX - prReserve - 2;
                doc.setDrawColor(232,93,46); doc.setLineWidth(0.6);
                doc.line(ar2L, midY, ar2R-4, midY);
                doc.triangle(ar2R-4,midY-2, ar2R,midY, ar2R-4,midY+2, 'F');

                // Labels above/below arrow2 — translated, same font size as side labels.
                // We give the labels 1 mm padding from the tank wall and use 7 pt to
                // ensure "Avvio: 999 barg" + flow value fit comfortably in the ≈28 mm span.
                const lbX = ar2L+1;
                doc.setFontSize(7); doc.setTextColor(30,60,100);
                doc.setFont("helvetica","bold");
                doc.text(`${pp.startShort}: ${fmtP(bf.pHigh)}`, lbX, midY-7, {align:"left"});
                doc.setFont("helvetica","normal");
                doc.text(fmtF(bf.qInletAtHigh), lbX, midY-3, {align:"left"});
                doc.setFont("helvetica","bold");
                doc.text(`${pp.stopShort}: ${fmtP(bf.pLow)}`, lbX, midY+5, {align:"left"});
                doc.setFont("helvetica","normal");
                doc.text(fmtF(bf.qInletAtLow), lbX, midY+9, {align:"left"});
              }

              // Reducer (PR) symbol + inner arrow if applicable
              if (hasReducer) {
                const prCX = boosterX - prReserve + 11; // center x of PR symbol
                drawPRvalve(prCX, midY);
                // Setpoint pressure label above PR
                doc.setFont("helvetica","bold"); doc.setFontSize(6); doc.setTextColor(130,85,30);
                doc.text(fmtP(best.reducerUpstream), prCX, midY-8, {align:"center"});
                // Small arrow from PR to booster
                const prArL = prCX+7, prArR = boosterX-1;
                doc.setDrawColor(232,93,46); doc.setLineWidth(0.6);
                doc.line(prArL, midY, prArR-3, midY);
                doc.triangle(prArR-3,midY-2, prArR,midY, prArR-3,midY+2, 'F');
              }

              // Booster image (proportional, no longer stretched)
              const imgX = boosterX;
              try { doc.addImage(BOOSTER_DATA_URI,'PNG', imgX, midY-imgH2/2, imgW2, imgH2); } catch(e){}

              // Cylinder rack (only for BON2 with active fill calc).
              // CONTINUOUS arrow booster → rack, with the booster output labels
              // (pOut + FAD) printed ABOVE the arrow.  This replaces the previous
              // split arrow + inline labels layout which broke the visual flow.
              if (showRackPDF) {
                const arBR_L = imgX + imgW2 + 1;                 // arrow start (booster exit)
                const rackX = imgX + imgW2 + minArrowGap;        // rack left edge (≈30 mm gap)
                const arBR_R = rackX;                            // arrow head (rack entry)
                doc.setDrawColor(232,93,46); doc.setLineWidth(0.6);
                doc.line(arBR_L, midY, arBR_R-3, midY);
                doc.triangle(arBR_R-3, midY-2, arBR_R, midY, arBR_R-3, midY+2, 'F');

                // Booster discharge labels — centered ABOVE the continuous arrow.
                // Two short stacked lines (pressure top, flow just below) so they
                // do not extend the arrow span and stay clear of the booster image.
                const lblCx = (arBR_L + arBR_R) / 2;
                doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(80,80,80);
                doc.text(fmtP(pOut_bar),                lblCx, midY-6, {align:"center"});
                doc.text(fmtF(result.fadRequested),     lblCx, midY-2, {align:"center"});

                // Cylinder rack drawing
                drawCylinderRackPDF(doc, rackX, midY-rackH/2, rackW, rackH);
              } else if (showDlvPDF) {
                // Delivery tank (BM ≤48 + storage add-on enabled).  Same visual
                // pattern as the rack: continuous booster→tank arrow with the
                // booster discharge labels (pOut + FAD) centred above it.  Tank
                // drawing is the buffer SVG WITHOUT the central fill ellipse.
                const arBT_L = imgX + imgW2 + 1;
                const tankX2 = imgX + imgW2 + minArrowGap;       // tank left edge
                const arBT_R = tankX2;
                doc.setDrawColor(232,93,46); doc.setLineWidth(0.6);
                doc.line(arBT_L, midY, arBT_R-3, midY);
                doc.triangle(arBT_R-3, midY-2, arBT_R, midY, arBT_R-3, midY+2, 'F');

                const lblCx = (arBT_L + arBT_R) / 2;
                doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(80,80,80);
                doc.text(fmtP(pOut_bar),            lblCx, midY-6, {align:"center"});
                doc.text(fmtF(result.fadRequested), lblCx, midY-2, {align:"center"});

                // Delivery-tank drawing (matches app SVG, no fill ellipse)
                const tankY2 = midY - dlvTankH_PDF/2;
                drawTankPDF(doc, tankX2, tankY2, dlvTankW_PDF, dlvTankH_PDF, /*withFill*/ false);
                // Volume caption below the tank — small blue label, mirrors the
                // on-screen "<V> L" caption.
                doc.setFont("helvetica","bold"); doc.setFontSize(7); doc.setTextColor(26,58,92);
                doc.text(`${dlvTank.V_L} L`, tankX2 + dlvTankW_PDF/2, tankY2 + dlvTankH_PDF + 3.5, {align:"center"});
              } else {
                // Arrow3: from booster to output pressure label (legacy)
                const ar3L = imgX+imgW2+2, ar3R = schX+schW-rightLblGap;
                doc.setDrawColor(232,93,46); doc.setLineWidth(0.6);
                doc.line(ar3L, midY, ar3R-4, midY);
                doc.triangle(ar3R-4,midY-2, ar3R,midY, ar3R-4,midY+2, 'F');

                // Right: output pressure + flow (right-aligned at far edge) — only legacy
                doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(80,80,80);
                doc.text(fmtP(pOut_bar), schX+schW-2, midY-3, {align:"right"});
                doc.text(fmtF(result.fadRequested), schX+schW-2, midY+5, {align:"right"});
              }
              y = schY + schH + 6;

              // ── 3) Output data ──
              sHead(pp.outputData);
              row(tt.nMachines, `${best.n} × ${best.model}`);
              if (best.kWtotal != null) row(tt.totalPower, `${fmt(fromMetric.power(best.kWtotal,units),1)} ${uLbl.pw}`);
              if (!isBMBON2 && best.qInletTotal != null) row(tt.totalAspirated, fmtF(best.qInletTotal));
              if (!isBMBON2 && best.fadTotal != null) row(tt.totalDelivered, fmtF(best.fadTotal));
              if (showBalance && best.pEqGauge != null) {
                row(tt.balancePressure, fmtP(best.pEqGauge));
                // Always show flows at balance pressure (whenever balance pressure is shown)
                if (flowsAtBalance) {
                  if (flowsAtBalance.qInletAtEq != null)
                    row(`${tt.bufEqAsp}`, `${fmtF(flowsAtBalance.qInletAtEq)}  ${pp.atBalance}`);
                  if (flowsAtBalance.fadAtEq != null)
                    row(`${tt.bufEqResa}`, `${fmtF(flowsAtBalance.fadAtEq)}  ${pp.atBalance}`);
                }
              }
              if (best.reducerUpstream != null) row(pp.redUp, fmtP(best.reducerUpstream));
              if (best.reducerDownstream != null) row(pp.redDown, fmtP(best.reducerDownstream));

              // ── 3a) Buffer scenario — printed BEFORE the cylinder rack /
              //         delivery tank so the booster operating cycle is documented
              //         first, then the storage add-on results that depend on it.
              if (bf && effectiveBufferOn && newBuf) {
                // Scenario WITH buffer
                ln(2); hrLine(); ln(3);
                sHead(tt.bufScenarioWith);
                row(pp.bufVolume, fmtVol(newBuf.volume_L));
                row(tt.bufSetStart, fmtP(bf.pHigh));
                row(tt.bufSetStop, fmtP(bf.pLow));
                row(tt.bufAvgAsp, fmtF(bf.qInletAvg));
                row(tt.bufAvgResa, fmtF(bf.fadAvg));
                row(`${pp.qAsp} ${pp.atStart}`,  `${fmtF(bf.qInletAtHigh)}  @ ${fmtP(bf.pHigh)}`);
                row(`${pp.qDel} ${pp.atStart}`,  `${fmtF(bf.fadAtHigh)}  @ ${fmtP(bf.pHigh)}`);
                row(`${pp.qAsp} ${pp.atStop}`,   `${fmtF(bf.qInletAtLow)}  @ ${fmtP(bf.pLow)}`);
                row(`${pp.qDel} ${pp.atStop}`,   `${fmtF(bf.fadAtLow)}  @ ${fmtP(bf.pLow)}`);
                row(pp.tFill, fmtTime(newBuf.tFill_s));
                row(pp.tEmpty, fmtTime(newBuf.tEmpty_s));
                row(pp.startsPerHour, `${newBuf.startsPerHour.toFixed(1)} /h  (max ${MAX_STARTS_PER_HOUR}/h)`);
              } else if (isBMBON2 && bf && !effectiveBufferOn) {
                // Scenario WITHOUT buffer
                ln(2); hrLine(); ln(3);
                sHead(tt.bufScenarioWithout);
                row(tt.balancePressure, fmtP(bf.pEqGauge));
                row(tt.bufEqAsp, `${fmtF(bf.qInletAtEq)}  @ ${fmtP(bf.pEqGauge)}`);
                row(tt.bufEqResa,     `${fmtF(bf.fadAtEq)}  @ ${fmtP(bf.pEqGauge)}`);
                if (!bufferFeasible) {
                  ln(2);
                  doc.setFont("helvetica","italic"); doc.setFontSize(8); doc.setTextColor(120,80,40);
                  doc.text(pp.bufferTooLarge, margin, y, {maxWidth: contentW});
                  ln(4);
                  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(50,50,50);
                }
              }

              // ── 3b) BON2 / BM>48: cylinder-rack filling rows ──
              if (cylFill) {
                ln(2); hrLine(); ln(3);
                doc.setFont("helvetica","bold"); doc.setFontSize(9.5); doc.setTextColor(45,90,55);
                doc.text(pp.cylSection, margin, y);
                ln(5);
                doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(50,50,50);
                row(pp.cylN, `${cylFill.N}`);
                row(pp.cylV, `${fmt(cylFill.V_L,0)} L`);
                row(pp.cylRestart, fmtP(cylFill.pStart_bar));
                // Customer-consumed flow (only printed when > 0 to keep the table tidy).
                if (cylFill.consumed_m3h > 0) {
                  row(pp.cylConsumed, `${fmt(cylFill.consumed_m3h,1)} m³/h FAD`);
                }
                // Sm³ → Nm³ to match customer terminology.  ΔP replaced with "dP"
                // because the Greek letter Δ (U+0394) is outside helvetica's WinAnsi
                // codepage in jsPDF and renders as letter-spaced gibberish (e.g. "° P = 5  b a r").
                row(pp.cylTotalAir, `${fmt(cylFill.totalAir_m3,1)} Nm³  @ ${fmtP(pOut_bar)}`);
                row(pp.cylTime, fmtTime(cylFill.t_s));
                row(pp.cylRefillAir, `${fmt(cylFill.refillAir_m3,1)} Nm³   dP=${fmt(pOut_bar - cylFill.pStart_bar,0)} bar`);
                row(pp.cylRefillTime, fmtTime(cylFill.t_s_refill));
              }

              // ── 3c) BM ≤48 bar: delivery-tank rows (NEW schema) ──
              //   V (selectable) · pRestart · Q consumed · t_fill · t_refill ·
              //   t_empty · starts/h.  Empty-time and starts/h omitted when Q
              //   is not provided.  Mirrors the on-screen card 1:1.
              if (dlvTank) {
                const dl = dlvL(pdfLang);
                ln(2); hrLine(); ln(3);
                doc.setFont("helvetica","bold"); doc.setFontSize(9.5); doc.setTextColor(45,90,55);
                doc.text(dl.section, margin, y);
                ln(5);
                doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(50,50,50);
                row(dl.vol, `${dlvTank.V_L} L`);
                row(dl.restart, fmtP(dlvTank.pStart_bar));
                if (dlvTank.qSet) {
                  row(dl.consumed, `${fmt(dlvTank.consumed_m3h,1)} m³/h FAD`);
                }
                row(dl.fillFromEmpty, fmtTime(dlvTank.t_s_full));
                row(dl.refill,        fmtTime(dlvTank.t_s_refill));
                if (dlvTank.t_s_empty != null) {
                  row(dl.empty, fmtTime(dlvTank.t_s_empty));
                }
                if (dlvTank.startsPerH != null) {
                  row(dl.starts, `${dlvTank.startsPerH.toFixed(1)} /h  (max ${DLV_MAX_STARTS}/h)`);
                }
                if (dlvTank.restartInvalid) {
                  ln(1);
                  doc.setFont("helvetica","italic"); doc.setFontSize(8); doc.setTextColor(120,80,40);
                  doc.text(dl.invalidRestart, margin, y, {maxWidth: contentW});
                  ln(4);
                  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(50,50,50);
                }
                if (dlvTank.overDemand) {
                  ln(1);
                  doc.setFont("helvetica","italic"); doc.setFontSize(8); doc.setTextColor(120,80,40);
                  doc.text(dl.overDemand, margin, y, {maxWidth: contentW});
                  ln(4);
                  doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(50,50,50);
                }
              }
              ln(2); hrLine(); ln(3);

              const footerY = 282;          // hoisted: also used by Master/Slave page-break guard

              // ── Master/Slave note (only when n > 1 machines) ──
              // SINGLE-PAGE mode: compact block (smaller fonts + tighter line height +
              // no leading icon).  No page-break guard — global spacings above are
              // tuned so this always fits on the same page above the footer.
              if (best.n > 1) {
                // Compact title (8.5pt instead of 9.5).  ⚙ removed — outside WinAnsi.
                doc.setFont("helvetica","bold"); doc.setFontSize(8.5); doc.setTextColor(45,90,55);
                doc.text(pp.msTitle, margin, y);
                ln(4);
                // Bold note line (8pt, 3.5mm pitch).
                doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(30,60,100);
                const noteLines = doc.splitTextToSize(pp.msNote, contentW);
                doc.text(noteLines, margin, y);
                ln(noteLines.length * 3.5 + 0.5);
                // Italic explanation (7pt, 3.0mm pitch — readable but compact).
                doc.setFont("helvetica","italic"); doc.setFontSize(7); doc.setTextColor(70,70,70);
                const explLines = doc.splitTextToSize(pp.msExpl, contentW);
                doc.text(explLines, margin, y);
                ln(explLines.length * 3 + 1);
                doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(50,50,50);
              }

              // ── Footer ──
              hrLine([200,200,200]);
              doc.setFont("helvetica","bold"); doc.setFontSize(7.5); doc.setTextColor(80,80,80);
              doc.text("NARDI COMPRESSORI SRL", W/2, footerY, {align:"center"});
              doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(110,110,110);
              doc.text("Via Marco Polo 2, Montecchio Maggiore 36075 (VI) Italia", W/2, footerY+4, {align:"center"});
              doc.text("P.Iva: IT00142920248   Tel +39 0444159111   Fax +39 0444159122   info@nardicompressori.com", W/2, footerY+8, {align:"center"});

              doc.save(`NardiCompressori_${best.model}_x${best.n}.pdf`);
            };

            return (
              <>
                {/* ===== Selezione modello (dropdown) ===== */}
                <div className="model-select-wrap">
                  <label>{t.availModels}</label>
                  <select
                    value={selectedModel || (result.rows[0]?.model ?? "")}
                    onChange={e => setSelectedModel(e.target.value)}
                  >
                    {result.rows.slice(0,10).map((r,i) => {
                      const tagR = r.reducerUpstream != null ? ` · Max inlet: ${fmtP(r.reducerUpstream)}` : "";
                      const tagB = r.bufferInfo ? (r.bufferInfo.infeasible ? " · ⚠ buffer n/a" : r.bufferInfo.level==="required" ? (TAGS_BUF_REQ[lang]||TAGS_BUF_REQ.en) : "") : "";
                      const tagPeq = (r.showBalance && r.pEqGauge != null) ? ` · ${fmtP(r.pEqGauge)}` : "";
                      const kwStr = r.kW != null ? ` · ${fmtPw(r.kW)}` : "";
                      return (
                        <option key={r.model+i} value={r.model}>
                          {r.n}× {r.model} — {fmtF(flowType==="aspirated" && selectedFamily!=="CM" ? r.qInletTotal : r.fadTotal)}{kwStr}{tagPeq}{tagR}{tagB}
                        </option>
                      );
                    })}
                  </select>
                </div>

                {/* ===== Sinottrico macchina ===== */}
                {(() => {
                  const hasBuf = bf && effectiveBufferOn;
                  const showDlvSyn = dlvApplies && dlvTank != null;
                  // ── Reusable tank SVG factory ──
                  // Both the upstream buffer tank and the downstream delivery tank
                  // share the exact same vector geometry — they only differ in the
                  // central "fill-level" ellipse:
                  //   - Buffer  : has the blue fill ellipse (it's a pressurised
                  //               accumulator with a visible level indicator)
                  //   - Delivery: omitted (per user request — "senza il cerchietto
                  //               blu nel mezzo") because a delivery tank doesn't
                  //               carry a level reading in this synoptic.
                  // Optional `caption` is a small label below the tank (e.g. "1000 L").
                  const makeTankSvg = (withFill, caption) => (
                    <div style={{flex:"0 0 auto",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                      <svg width="38" height="78" viewBox="0 0 38 78">
                        {/* Top cap */}
                        <ellipse cx="19" cy="10" rx="16" ry="5" fill="#D0E4F7" stroke="#3B7AC9" strokeWidth="1.5"/>
                        {/* Body */}
                        <rect x="3" y="10" width="32" height="54" fill="#E8F2FC" stroke="#3B7AC9" strokeWidth="1.5"/>
                        {/* Bottom cap */}
                        <ellipse cx="19" cy="64" rx="16" ry="5" fill="#C4D8F0" stroke="#3B7AC9" strokeWidth="1.5"/>
                        {/* Gauge line */}
                        <line x1="3" y1="38" x2="35" y2="38" stroke="#3B7AC9" strokeWidth="0.8" strokeDasharray="3 2"/>
                        {/* Fill level (ONLY for buffer; suppressed for delivery tank) */}
                        {withFill && (
                          <ellipse cx="19" cy="38" rx="16" ry="4.5" fill="#A0C4E8" stroke="#3B7AC9" strokeWidth="1"/>
                        )}
                      </svg>
                      {caption && (
                        <div style={{fontSize:9,fontWeight:600,color:"#1a3a5c",whiteSpace:"nowrap"}}>{caption}</div>
                      )}
                    </div>
                  );
                  const tankSvg    = makeTankSvg(true,  null);
                  const dlvTankSvg = showDlvSyn ? makeTankSvg(false, `${dlvTank.V_L} L`) : null;
                  // Double-headed arrow between tank and booster (shows pHigh above, pLow below)
                  const bufArrow = hasBuf ? (
                    <div style={{flex:"0 0 auto",display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#1a3a5c",whiteSpace:"nowrap"}}>▲ {fmtP(bf.pHigh)}</div>
                      <div style={{fontSize:9.5,color:"#3B7AC9",whiteSpace:"nowrap"}}>{fmtF(bf.qInletAtHigh)}</div>
                      <svg width="60" height="18" viewBox="0 0 60 18" style={{margin:"2px 0"}}>
                        <line className="arr-line" x1="2" y1="9" x2="50" y2="9" stroke="#3B7AC9" strokeWidth="2" strokeLinecap="round"/>
                        <polyline points="44,5 56,9 44,13" fill="none" stroke="#3B7AC9" strokeWidth="2" strokeLinejoin="round"/>
                      </svg>
                      <div style={{fontSize:9.5,color:"#3B7AC9",whiteSpace:"nowrap"}}>{fmtF(bf.qInletAtLow)}</div>
                      <div style={{fontSize:10,fontWeight:700,color:"#1a3a5c",whiteSpace:"nowrap"}}>▼ {fmtP(bf.pLow)}</div>
                    </div>
                  ) : null;
                  return (
                    <div className="synoptic" style={{marginBottom:14,flexWrap:"wrap",gap:4}}>
                      {/* Left: inlet from network */}
                      <div className="syn-side left">
                        {showIntakeSyn && <div className="syn-p">{fmtP(pIn_bar)}</div>}
                        <div className="syn-q">{fmtF(result.qInletRequested)}</div>
                      </div>
                      {arrowSvg}
                      {/* Buffer tank (conditional) */}
                      {hasBuf && tankSvg}
                      {hasBuf && bufArrow}
                      {/* Reducer (if any) + extra arrow */}
                      {reducerSvg}
                      {reducerSvg && arrowSvg}
                      {/* If no buffer and no reducer, show arrow is already rendered */}
                      {!hasBuf && !reducerSvg && null}
                      {/* Booster image */}
                      <div className="syn-img-wrap">
                        <img className="syn-img" src={BOOSTER_DATA_URI} alt="Booster Nardi" />
                      </div>
                      {arrowSvg}
                      {/* Cylinder rack (BON2 always; BM only when pOut > 48 bar — see cylFill).
                           Booster output labels (pOut + FAD) are placed INLINE between
                           booster→rack because they describe booster output flowing into
                           the rack — they are NOT "rack output". */}
                      {cylFill && (
                        <>
                          <div className="syn-side inline-mid">
                            <div className="syn-p">{fmtP(pOut_bar)}</div>
                            <div className="syn-q">{fmtF(result.fadRequested)}</div>
                          </div>
                          {arrowSvg}
                          <div className="syn-rack-wrap" title={t.cylRack}>
                            <svg className="syn-rack" viewBox="0 0 88 110" width="78" height="98" preserveAspectRatio="xMidYMid meet">
                              {/* 5 cylinders */}
                              {[0,1,2,3,4].map(i => {
                                const cx = 8 + i*16 + 6;
                                return (
                                  <g key={i}>
                                    {/* Body */}
                                    <rect x={cx-5} y={10} width={10} height={28} fill="#A8AEB6" stroke="#4A4D52" strokeWidth="0.6"/>
                                    {/* Shoulder cap */}
                                    <ellipse cx={cx} cy={10} rx={5} ry={2} fill="#2D7A46" stroke="#1A5028" strokeWidth="0.5"/>
                                    {/* Valve neck */}
                                    <rect x={cx-2} y={4} width={4} height={6} fill="#3A3D40" stroke="#1F2123" strokeWidth="0.4"/>
                                    {/* Valve handle */}
                                    <ellipse cx={cx} cy={4} rx={2.4} ry={0.9} fill="#B53028"/>
                                  </g>
                                );
                              })}
                              {/* Cage frame */}
                              <rect x={3} y={36} width={82} height={64} fill="none" stroke="#6E6E6E" strokeWidth="1.5"/>
                              {/* Side mesh (X pattern) */}
                              {[0,1,2,3].map(i => {
                                const yT = 40 + i*9;
                                return (
                                  <g key={"m"+i} stroke="#909090" strokeWidth="0.6">
                                    <line x1={4} y1={yT} x2={11} y2={yT+8}/>
                                    <line x1={11} y1={yT} x2={4} y2={yT+8}/>
                                    <line x1={77} y1={yT} x2={84} y2={yT+8}/>
                                    <line x1={84} y1={yT} x2={77} y2={yT+8}/>
                                  </g>
                                );
                              })}
                              {/* Steel front panel */}
                              <rect x={4} y={72} width={80} height={26} fill="#C8CDD2" stroke="#8A8E92" strokeWidth="0.8"/>
                              {/* Handle slots */}
                              <ellipse cx={28} cy={85} rx={5} ry={1.5} fill="#3F4145"/>
                              <ellipse cx={60} cy={85} rx={5} ry={1.5} fill="#3F4145"/>
                              {/* Feet */}
                              <rect x={4} y={100} width={9} height={6} fill="#5A5C60" stroke="#2F3134" strokeWidth="0.5"/>
                              <rect x={75} y={100} width={9} height={6} fill="#5A5C60" stroke="#2F3134" strokeWidth="0.5"/>
                            </svg>
                          </div>
                        </>
                      )}
                      {/* Delivery tank — only for BM ≤48 bar with the storage
                           add-on enabled.  Mirrors the cylinder-rack pattern:
                           inline labels (pOut + FAD) → arrow → tank.  The tank
                           drawing reuses the buffer-tank SVG WITHOUT the central
                           fill ellipse (per request: "senza il cerchietto blu"). */}
                      {showDlvSyn && (
                        <>
                          <div className="syn-side inline-mid">
                            <div className="syn-p">{fmtP(pOut_bar)}</div>
                            <div className="syn-q">{fmtF(result.fadRequested)}</div>
                          </div>
                          {arrowSvg}
                          {dlvTankSvg}
                        </>
                      )}
                      {/* Right: output — hidden when the rack OR delivery tank is
                           shown, because the booster-output labels are rendered
                           INLINE between booster→storage instead. */}
                      {!cylFill && !showDlvSyn && (
                        <div className="syn-side right">
                          <div className="syn-p">{fmtP(pOut_bar)}</div>
                          <div className="syn-q">{fmtF(result.fadRequested)}</div>
                        </div>
                      )}
                    </div>
                  );
                })()}

                {/* ===== KPI macchina — solo N macchine + potenza per BM/BON2 ===== */}
                {isBMBON2 ? (
                  <div className="kpi-grid" style={{gridTemplateColumns:"1fr 1fr"}}>
                    <div className="kpi">
                      <div className="lbl">{t.nMachines}</div>
                      <div className="val" style={{fontSize:28}}>{best.n}
                        <small style={{fontSize:14,fontWeight:600,marginLeft:6}}>× {best.model}</small>
                      </div>
                    </div>
                    <div className="kpi">
                      <div className="lbl">{t.totalPower}</div>
                      <div className="val">{best.kWtotal != null ? fmt(fromMetric.power(best.kWtotal,units),1) : "—"}{best.kWtotal != null && <small>{uLbl.pw}</small>}</div>
                    </div>
                  </div>
                ) : (
                  <div className="kpi-grid">
                    <div className="kpi">
                      <div className="lbl">{t.nMachines}</div>
                      <div className="val">{best.n}<small>× {best.model}</small></div>
                    </div>
                    <div className="kpi">
                      <div className="lbl">{t.totalPower}</div>
                      <div className="val">{best.kWtotal != null ? fmt(fromMetric.power(best.kWtotal,units),1) : "—"}{best.kWtotal != null && <small>{uLbl.pw}</small>}</div>
                    </div>
                    <div className="kpi">
                      <div className="lbl">{t.totalAspirated}</div>
                      <div className="val">{fmt(flowFromM3H(best.qInletTotal,flowUnit),1)}<small>{FLOW_UNIT_LBL[flowUnit]}</small></div>
                    </div>
                    <div className="kpi">
                      <div className="lbl">{t.totalDelivered}</div>
                      <div className="val">{fmt(flowFromM3H(best.fadTotal,flowUnit),1)}<small>{FLOW_UNIT_LBL[flowUnit]}</small></div>
                    </div>
                  </div>
                )}

                {/* ===== AVVISO: buffer richiesto ma > 1500 L → solo soluzione senza buffer ===== */}
                {isBMBON2 && bf && !bufferFeasible && (bufRequired || bufRecommended) && (
                  <div style={{marginTop:16,padding:"12px 16px",background:"#FFF4F0",
                       border:"2px solid #C9960F",borderRadius:8,color:"#7A5C00"}}>
                    <strong>⚠ Volume buffer richiesto &gt; 1500 L — viene proposta solo la soluzione senza buffer.</strong>
                  </div>
                )}

                {/* ===== TOGGLE BUFFER (BM / BON2) ===== */}
                {showBufferToggle && (
                  <div style={{marginTop:16,display:"flex",alignItems:"center",gap:12,padding:"12px 16px",
                    background: bufRequired ? "#FFF4F0" : bufRecommended ? "#FFFBF0" : "#F0F7FF",
                    border:"2px solid " + (bufRequired ? "#D14343" : bufRecommended ? "#E8A020" : "#3B7AC9"),
                    borderRadius:8}}>
                    <div style={{flex:1}}>
                      {bufRequired && <strong style={{color:"#8A2323"}}>{t.bufRequired}</strong>}
                      {bufRecommended && <strong style={{color:"#7A5000"}}>{t.bufRecommendedNote} — {t.balancePressure.toLowerCase()}: {fmtP(best.pEqGauge)}, {fmt(fromMetric.pressure(pIn_bar,units)-fromMetric.pressure(best.pEqGauge,units),1)} {uLbl.p}</strong>}
                      {!bufRequired && !bufRecommended && <span style={{color:"#214469",fontWeight:600}}>{t.bufOptional}</span>}
                    </div>
                    <div className="flow-seg" style={{height:38,minWidth:200}}>
                      <button className={bufferEnabled?"active":""} onClick={()=>setBufferEnabled(true)}
                        style={bufferEnabled?{}:{background:"transparent"}}>{t.withBuffer}</button>
                      <button className={!bufferEnabled?"active":""} onClick={()=>setBufferEnabled(false)}
                        style={!bufferEnabled?{}:{background:"transparent"}}>{t.withoutBuffer}</button>
                    </div>
                  </div>
                )}

                {/* ===== BALANCE-POINT FLOWS (BM/BON2) — always shown when applicable ===== */}
                {/* Shown for every BM/BON2 selection that has a computed balance pressure,
                    regardless of buffer toggle state and regardless of whether the buffer
                    is feasible. This covers all family/flow/pressure combinations. */}
                {isBMBON2 && bf && bf.pEqGauge != null && (
                  <>
                    <div className="note" style={{marginTop:12}}>
                      <strong>
                        {effectiveBufferOn
                          ? `${t.balancePressure}: ${fmtP(bf.pEqGauge)}`
                          : `${t.bufScenarioWithout} — ${t.balancePressure}: ${fmtP(bf.pEqGauge)}`}
                      </strong>
                      <br/><small style={{color:"var(--muted)"}}>{t.balanceNote}</small>
                    </div>
                    <div className="kpi-grid" style={{marginTop:10,gridTemplateColumns:"1fr 1fr"}}>
                      <div className="kpi">
                        <div className="lbl">{t.bufEqAsp}</div>
                        <div className="val">{fmt(flowFromM3H(bf.qInletAtEq, flowUnit),1)}<small>{FLOW_UNIT_LBL[flowUnit]}</small></div>
                        <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>@ {fmtP(bf.pEqGauge)}</div>
                      </div>
                      <div className="kpi">
                        <div className="lbl">{t.bufEqResa}</div>
                        <div className="val">{fmt(flowFromM3H(bf.fadAtEq, flowUnit),1)}<small>{FLOW_UNIT_LBL[flowUnit]}</small></div>
                        <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>@ {fmtP(bf.pEqGauge)}</div>
                      </div>
                    </div>
                  </>
                )}

                {/* ===== SCENARIO CON BUFFER (BM/BON2) ===== */}
                {showBufferToggle && effectiveBufferOn && bf && (
                  <>
                    <div className="section-title" style={{marginTop:14}}>{t.bufScenarioWith}</div>

                    {/* Avvio = pressione alta (pHigh = pIn-0.2); Arresto = pressione bassa (pLow = pEq+0.2) */}
                    <div className="buf-2col">
                      <div className="kpi" style={{background:"#F4F8FF",border:"1px solid #ADC8F0"}}>
                        <div className="lbl" style={{color:"#214469",marginBottom:2}}>{t.bufStartParams}</div>
                        <div style={{fontSize:15,fontWeight:700,color:"#214469",marginBottom:8,padding:"4px 0"}}>{t.bufSetStart}: {fmtP(pIn_bar - 0.2)}</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                          <div>
                            <div style={{fontSize:11,color:"var(--muted)",marginBottom:2}}>{t.totalAspirated} · {fmtP(bf.pHigh)}</div>
                            <div className="val">{fmt(flowFromM3H(bf.qInletAtHigh,flowUnit),1)}<small>{FLOW_UNIT_LBL[flowUnit]}</small></div>
                          </div>
                          <div>
                            <div style={{fontSize:11,color:"var(--muted)",marginBottom:2}}>{t.totalDelivered} · {fmtP(bf.pHigh)}</div>
                            <div className="val">{fmt(flowFromM3H(bf.fadAtHigh,flowUnit),1)}<small>{FLOW_UNIT_LBL[flowUnit]}</small></div>
                          </div>
                        </div>
                      </div>

                      {/* Arresto: pressione bassa = pEq+0.2 */}
                      <div className="kpi" style={{background:"#F4F8FF",border:"1px solid #ADC8F0"}}>
                        <div className="lbl" style={{color:"#214469",marginBottom:2}}>{t.bufStopParams}</div>
                        <div style={{fontSize:15,fontWeight:700,color:"#214469",marginBottom:8,padding:"4px 0"}}>{t.bufSetStop}: {fmtP(bf.pLow)}</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                          <div>
                            <div style={{fontSize:11,color:"var(--muted)",marginBottom:2}}>{t.totalAspirated} · {fmtP(bf.pLow)}</div>
                            <div className="val">{fmt(flowFromM3H(bf.qInletAtLow,flowUnit),1)}<small>{FLOW_UNIT_LBL[flowUnit]}</small></div>
                          </div>
                          <div>
                            <div style={{fontSize:11,color:"var(--muted)",marginBottom:2}}>{t.totalDelivered} · {fmtP(bf.pLow)}</div>
                            <div className="val">{fmt(flowFromM3H(bf.fadAtLow,flowUnit),1)}<small>{FLOW_UNIT_LBL[flowUnit]}</small></div>
                          </div>
                        </div>
                      </div>
                    </div>

                    {/* Portata media — larghezza uguale alle due sopra = tutta la riga */}
                    <div className="kpi" style={{marginTop:8,background:"#EFF6EE",border:"1px solid #7DBB78"}}>
                      <div className="lbl" style={{color:"#2A5C27",marginBottom:6}}>{t.bufAvgCycle}</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                        <div>
                          <div style={{fontSize:11,color:"var(--muted)",marginBottom:2}}>{t.bufAvgAsp}</div>
                          <div className="val">{fmt(flowFromM3H(bf.qInletAvg,flowUnit),1)}<small>{FLOW_UNIT_LBL[flowUnit]}</small></div>
                        </div>
                        <div>
                          <div style={{fontSize:11,color:"var(--muted)",marginBottom:2}}>{t.bufAvgResa}</div>
                          <div className="val">{fmt(flowFromM3H(bf.fadAvg,flowUnit),1)}<small>{FLOW_UNIT_LBL[flowUnit]}</small></div>
                        </div>
                      </div>
                    </div>

                    {/* Serbatoio buffer */}
                    <div className="section-title" style={{marginTop:14}}>{t.bufSizing}<InfoTip text={tip.buffer}/></div>
                    {newBuf ? (
                      <div className="buf-5col">
                        {/* Volume — selettore dropdown */}
                        <div className="kpi" style={{border:"2px solid #ADC8F0",background:"#F4F8FF"}}>
                          <div className="lbl" style={{color:"#214469"}}>{t.bufferVolume}</div>
                          <div className="val" style={{color:"#214469"}}>{fmtVol(newBuf.volume_L)}</div>
                          {validSizesL.length > 1 && (
                            <select
                              style={{marginTop:6,width:"100%",fontSize:13,padding:"3px 6px",borderRadius:4,border:"1px solid #ADC8F0",background:"#fff",cursor:"pointer"}}
                              value={newBuf.volume_L}
                              onChange={e => setSelectedBufferSize(parseInt(e.target.value, 10))}>
                              {validSizesL.map(L => (
                                <option key={L} value={L}>{fmtVol(L)}</option>
                              ))}
                            </select>
                          )}
                        </div>
                        <div className="kpi">
                          <div className="lbl">{t.bufferFill}</div>
                          <div className="val" style={{fontSize:18}}>{fmtTime(newBuf.tFill_s)}</div>
                        </div>
                        <div className="kpi">
                          <div className="lbl">{t.bufferEmpty}</div>
                          <div className="val" style={{fontSize:18}}>{fmtTime(newBuf.tEmpty_s)}</div>
                        </div>
                        <div className="kpi">
                          <div className="lbl">{t.bufferCycle}</div>
                          <div className="val" style={{fontSize:18}}>{fmtTime(newBuf.tCycle_s)}</div>
                        </div>
                        <div className="kpi" style={{background: newBuf.startsPerHour > MAX_STARTS_PER_HOUR ? "#FFF4F0" : "#EFF6EE",
                          border: newBuf.startsPerHour > MAX_STARTS_PER_HOUR ? "1px solid #D14343" : "1px solid #7DBB78"}}>
                          <div className="lbl" style={{color: newBuf.startsPerHour > MAX_STARTS_PER_HOUR ? "#8A2323" : "#2A5C27",fontWeight:700}}>{t.bufferStarts}<InfoTip text={tip.starts}/></div>
                          <div className="val" style={{fontSize:22,color: newBuf.startsPerHour > MAX_STARTS_PER_HOUR ? "#D14343" : "#2A5C27",fontWeight:800}}>
                            {newBuf.startsPerHour.toFixed(1)}<small style={{fontSize:13}}>/h</small>
                          </div>
                          <div style={{fontSize:10,color:"var(--muted)",marginTop:2}}>max {MAX_STARTS_PER_HOUR}/h</div>
                        </div>
                      </div>
                    ) : null}
                  </>
                )}

                {/* ===== BALANCE NOTE — fallback only when bf is unavailable.
                       When bf exists, the dedicated balance-flows block above already shows
                       this information (with both flows), so we skip rendering here to avoid
                       duplication. ===== */}
                {showBalance && !bf && best.pEqGauge != null && (() => {
                  const _fadEq = best.fadFn ? best.fadFn(best.pEqGauge) * (best.n || 1) : null;
                  return (
                    <div className="note">
                      <strong>{t.balancePressure}<InfoTip text={tip.balance}/>:</strong> {fmtP(best.pEqGauge)}
                      {(result.qInletRequested != null || _fadEq != null) && (
                        <div style={{marginTop:6, fontSize:"0.92em"}}>
                          {result.qInletRequested != null && (<div><strong>{t.bufEqAsp}:</strong> {fmtF(result.qInletRequested)}</div>)}
                          {_fadEq != null && (<div><strong>{t.bufEqResa}:</strong> {fmtF(_fadEq)}</div>)}
                        </div>
                      )}
                      <br/><small style={{color:"var(--muted)"}}>{t.balanceNote}</small>
                    </div>
                  );
                })()}

                {/* ===== Storage add-on TOGGLE =====
                     One switch that gates both the cylinder rack (BON2 / BM>48 bar)
                     and the delivery tank (BM ≤48 bar) sections.  Customers don't
                     always want a storage add-on quoted by default. */}
                {(cylRegime || dlvRegime) && (
                  <div style={{marginTop:16, padding:"10px 12px",
                               background:"#F4F7F4", border:"1px solid #C7D8C7",
                               borderRadius:6, display:"flex", alignItems:"center", gap:10}}>
                    <label style={{display:"flex", alignItems:"center", gap:8, cursor:"pointer", margin:0}}>
                      <input
                        type="checkbox"
                        checked={addonEnabled}
                        onChange={e => setAddonEnabled(e.target.checked)}
                        style={{width:18, height:18, cursor:"pointer"}}
                      />
                      <span style={{fontWeight:600, color:"#1a5028"}}>
                        {dlvRegime ? dlvL(lang).addonToggle : t.cylTitle}
                      </span>
                    </label>
                  </div>
                )}

                {/* ===== Cylinder rack: input + fill times (bottom of card) =====
                     Shown for BON2 (any pressure) and BM > 48 bar — gated by toggle.
                     Includes: N · V · Restart pressure (default 250 barg) · Customer flow.
                     If customer flow ≥ booster FAD, refill time displays "-:-- h". */}
                {cylApplies && (
                  <div className="cyl-section" style={{marginTop:16}}>
                    <div className="section-title">{t.cylTitle}</div>
                    <div className="cyl-grid" style={{gridTemplateColumns:"repeat(4, minmax(0,1fr))"}}>
                      <div className="cyl-input-block">
                        <label className="cyl-label">
                          {t.cylN}
                          <InfoTip text={t.cylN}/>
                        </label>
                        <input
                          type="number" min="1" step="1"
                          className="cyl-input"
                          value={cylN}
                          onChange={e => setCylN(e.target.value)}
                        />
                      </div>
                      <div className="cyl-input-block">
                        <label className="cyl-label">
                          {t.cylV} <small>(L)</small>
                          <InfoTip text={t.cylV + " — bombola standard 50 L."}/>
                        </label>
                        <input
                          type="number" min="1" step="1"
                          className="cyl-input"
                          value={cylV}
                          onChange={e => setCylV(e.target.value)}
                        />
                      </div>
                      <div className="cyl-input-block">
                        <label className="cyl-label">
                          {t.cylRestart} <small>(barg)</small>
                          <InfoTip text={t.cylRestartHint + " Deve essere strettamente inferiore alla pressione di mandata."}/>
                        </label>
                        <input
                          type="number" min="0" step="1"
                          className="cyl-input"
                          placeholder={cylFill ? fmt(cylFill.pRestartDefault, 0) : "250"}
                          value={cylRestart}
                          onChange={e => setCylRestart(e.target.value)}
                          style={(() => {
                            const v = parseFloat(cylRestart);
                            const bad = cylRestart !== "" && Number.isFinite(v) && pOut_bar != null && v >= pOut_bar;
                            return bad ? {borderColor:"#C04040", background:"#FFF5F5"} : {};
                          })()}
                        />
                      </div>
                      <div className="cyl-input-block">
                        <label className="cyl-label">
                          {t.cylConsumed} <small>(m³/h FAD)</small>
                          <InfoTip text={t.cylConsumedHint}/>
                        </label>
                        <input
                          type="number" min="0" step="0.1"
                          className="cyl-input"
                          placeholder="0"
                          value={cylConsumed}
                          onChange={e => setCylConsumed(e.target.value)}
                        />
                      </div>
                    </div>
                    {/* Validation: pStart >= pOut */}
                    {(() => {
                      const v = parseFloat(cylRestart);
                      const bad = cylRestart !== "" && Number.isFinite(v) && pOut_bar != null && v >= pOut_bar;
                      return bad ? (
                        <div className="note warn" style={{marginTop:10,fontSize:12}}>
                          ⚠ La pressione di ripartenza ({fmt(v,0)} barg) deve essere inferiore alla pressione di mandata ({fmtP(pOut_bar)}). Sto usando il valore di default ({cylFill ? fmt(cylFill.pStart_bar,0) : "—"} barg).
                        </div>
                      ) : null;
                    })()}
                    {/* Inline warning if consumption blocks the refill cycle. */}
                    {cylFill && cylFill.consumed_m3h >= cylFill.fad_m3h && (
                      <div className="note warn" style={{marginTop:10,fontSize:12}}>
                        ⚠ {t.cylConsumed}: {fmt(cylFill.consumed_m3h,1)} m³/h ≥ FAD ({fmt(cylFill.fad_m3h,1)} m³/h) — refill non possibile.
                      </div>
                    )}
                    <div className="cyl-grid" style={{marginTop:10,gridTemplateColumns:"1fr 1fr"}}>
                      <div className="kpi cyl-result">
                        <div className="lbl">
                          {t.cylFillTime}
                          <InfoTip text={"Tempo necessario per riempire le bombole da 0 barg fino alla pressione di mandata.\nFormula: t [h] = (N · V[L] / 1000) · pOut[bar] / FAD_netto / etaV."}/>
                        </div>
                        <div className="val" style={{fontSize:22,color:"#1a5028"}}>
                          {cylFill ? fmtTime(cylFill.t_s) : "—"}
                        </div>
                        {cylFill && (
                          <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>
                            {fmt(cylFill.totalAir_m3,1)} Nm³ FAD · @ {fmtP(pOut_bar)} · ΔP={fmt(pOut_bar,0)} bar
                            {cylFill.consumed_m3h > 0 && ` · −${fmt(cylFill.consumed_m3h,1)} m³/h consumati`}
                          </div>
                        )}
                      </div>
                      <div className="kpi cyl-result" style={{background:"#FFF8E8",border:"1px solid #E8A020"}}>
                        <div className="lbl" style={{color:"#7A5000"}}>
                          {t.cylRefillTime}
                          <InfoTip text={"Tempo per ripressurizzare le bombole dalla pressione di ripartenza alla pressione di mandata.\nFormula: t [h] = (N · V[L] / 1000) · (pOut − pRipartenza) / FAD_netto / etaV."}/>
                        </div>
                        <div className="val" style={{fontSize:22,color:"#7A5000"}}>
                          {cylFill ? fmtTime(cylFill.t_s_refill) : "—"}
                        </div>
                        {cylFill && (
                          <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>
                            {fmt(cylFill.refillAir_m3,1)} Nm³ FAD · ΔP={fmt(pOut_bar - cylFill.pStart_bar,0)} bar (da {fmtP(cylFill.pStart_bar)})
                            {cylFill.consumed_m3h > 0 && ` · −${fmt(cylFill.consumed_m3h,1)} m³/h consumati`}
                          </div>
                        )}
                      </div>
                    </div>
                    <div className="cyl-note">
                      <strong>{t.cylFillTime}:</strong> {t.cylInitial} 0 barg · {t.cylNote}
                      <br/><strong>{t.cylRefillTime}:</strong> {t.cylRestartHint}
                      <br/><strong>{t.cylConsumed}:</strong> {t.cylConsumedHint}
                    </div>
                  </div>
                )}

                {/* ===== BM ≤48 bar — DELIVERY TANK ("serbatoio di mandata") =====
                     Mirror of the cylinder-rack UX:
                       inputs:  Volume select · Restart pressure · Consumed flow
                       results: Fill time (empty) · Refill time · Empty time · Starts/h
                     Empty time and Starts/h render only when consumed flow is set. */}
                {dlvApplies && dlvTank && (() => {
                  const dl = dlvL(lang);
                  const startsOK   = dlvTank.startsPerH != null && dlvTank.startsPerH <= DLV_MAX_STARTS;
                  return (
                    <div className="cyl-section" style={{marginTop:16}}>
                      <div className="section-title">{dl.section}</div>
                      <div style={{fontSize:12,color:"var(--muted)",marginTop:-4,marginBottom:10}}>
                        {dl.subtitle}
                      </div>
                      {/* ── Inputs (Volume select · Restart P · Consumed flow) ── */}
                      <div className="cyl-grid" style={{gridTemplateColumns:"repeat(3, minmax(0,1fr))"}}>
                        <div className="cyl-input-block">
                          <label className="cyl-label">
                            {dl.vol} <small>(L)</small>
                            <InfoTip text={dl.volHint}/>
                          </label>
                          <select
                            className="cyl-input"
                            value={dlvV}
                            onChange={e => setDlvV(e.target.value)}
                          >
                            {DLV_TANK_SIZES.map(v => (
                              <option key={v} value={String(v)}>{v} L</option>
                            ))}
                          </select>
                        </div>
                        <div className="cyl-input-block">
                          <label className="cyl-label">
                            {dl.restart} <small>(barg)</small>
                            <InfoTip text={dl.restartHint}/>
                          </label>
                          <input
                            type="number" min="0" step="1"
                            className="cyl-input"
                            placeholder={fmt(dlvTank.pRestartDefault, 0)}
                            value={dlvRestart}
                            onChange={e => setDlvRestart(e.target.value)}
                            style={dlvTank.restartInvalid ? {borderColor:"#C04040", background:"#FFF5F5"} : {}}
                          />
                        </div>
                        <div className="cyl-input-block">
                          <label className="cyl-label">
                            {dl.consumed} <small>(m³/h FAD)</small>
                            <InfoTip text={dl.consumedHint}/>
                          </label>
                          <input
                            type="number" min="0" step="0.1"
                            className="cyl-input"
                            placeholder="0"
                            value={dlvConsumed}
                            onChange={e => setDlvConsumed(e.target.value)}
                          />
                        </div>
                      </div>

                      {dlvTank.restartInvalid && (
                        <div className="note warn" style={{marginTop:10,fontSize:12}}>
                          {dl.invalidRestart} Sto usando il valore di default ({fmt(dlvTank.pRestartDefault,0)} barg).
                        </div>
                      )}
                      {dlvTank.overDemand && (
                        <div className="note warn" style={{marginTop:10,fontSize:12}}>
                          {dl.overDemand} (Q = {fmt(dlvTank.consumed_m3h,1)} m³/h ≥ FAD = {fmt(dlvTank.fad_m3h,1)} m³/h)
                        </div>
                      )}

                      {/* ── KPIs (Fill / Refill / Empty / Starts/h) ── */}
                      <div className="cyl-grid" style={{marginTop:10,gridTemplateColumns:"repeat(4, minmax(0,1fr))"}}>
                        <div className="kpi cyl-result">
                          <div className="lbl">
                            {dl.fillFromEmpty}
                            <InfoTip text={dl.fillFromEmptyHint}/>
                          </div>
                          <div className="val" style={{fontSize:20,color:"#1a5028"}}>
                            {fmtTime(dlvTank.t_s_full)}
                          </div>
                          <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>
                            ΔP={fmt(pOut_bar,0)} bar · V={dlvTank.V_L} L
                          </div>
                        </div>
                        <div className="kpi cyl-result" style={{background:"#FFF8E8",border:"1px solid #E8A020"}}>
                          <div className="lbl" style={{color:"#7A5000"}}>
                            {dl.refill}
                            <InfoTip text={dl.refillHint}/>
                          </div>
                          <div className="val" style={{fontSize:20,color:"#7A5000"}}>
                            {fmtTime(dlvTank.t_s_refill)}
                          </div>
                          <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>
                            ΔP={fmt(pOut_bar - dlvTank.pStart_bar,0)} bar (da {fmtP(dlvTank.pStart_bar)})
                          </div>
                        </div>
                        <div className="kpi cyl-result">
                          <div className="lbl">
                            {dl.empty}
                            <InfoTip text={dl.emptyHint}/>
                          </div>
                          <div className="val" style={{fontSize:20}}>
                            {dlvTank.t_s_empty != null ? fmtTime(dlvTank.t_s_empty) : "-:--"}
                          </div>
                          <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>
                            {dlvTank.qSet
                              ? `Q = ${fmt(dlvTank.consumed_m3h,1)} m³/h`
                              : `Q ${dl.notSet}`}
                          </div>
                        </div>
                        <div className="kpi cyl-result"
                             style={{background: (dlvTank.startsPerH==null) ? "#F5F5F5"
                                       : (startsOK ? "#EFF6EF" : "#FBEAEA"),
                                     border: (dlvTank.startsPerH==null) ? "1px solid #CCC"
                                       : (startsOK ? "1px solid #6BB36B" : "1px solid #C04040")}}>
                          <div className="lbl" style={{color: (dlvTank.startsPerH==null) ? "#666"
                                                       : (startsOK ? "#1a5028" : "#8B2020")}}>
                            {dl.starts}
                            <InfoTip text={dl.startsHint}/>
                          </div>
                          <div className="val" style={{fontSize:20, color: (dlvTank.startsPerH==null) ? "#666"
                                                       : (startsOK ? "#1a5028" : "#8B2020")}}>
                            {dlvTank.startsPerH != null ? `${dlvTank.startsPerH.toFixed(1)} /h` : "-:--"}
                          </div>
                          <div style={{fontSize:11,color:"var(--muted)",marginTop:4}}>
                            {dlvTank.startsPerH != null
                              ? (startsOK ? dl.belowMax : dl.aboveMax)
                              : `${dl.maxStarts}: ${DLV_MAX_STARTS}/h`}
                          </div>
                        </div>
                      </div>

                      <div className="cyl-note">
                        <strong>{dl.boosterFAD}:</strong> {fmt(dlvTank.fad_m3h,1)} m³/h
                        {dlvTank.qSet && (
                          <> · <strong>{dl.consumed}:</strong> {fmt(dlvTank.consumed_m3h,1)} m³/h</>
                        )}
                        <br/>{dl.note}
                      </div>
                    </div>
                  );
                })()}

                {/* ===== Master/Slave note (any family, when n > 1 machines) ===== */}
                {best.n > 1 && (
                  <div className="note" style={{marginTop:14,background:"#EEF4FB",border:"1px solid #B8CFEA",padding:"10px 12px",borderRadius:6}}>
                    <div style={{fontWeight:700,color:"#1a3a5c",marginBottom:4}}>
                      ⚙ {t.msTitle}
                    </div>
                    <div style={{fontSize:13,fontWeight:600,color:"#1a3a5c",marginBottom:6}}>
                      {t.msNote}
                    </div>
                    <div style={{fontSize:12.5,lineHeight:1.45,color:"var(--ink-soft)"}}>
                      {t.msExpl}
                    </div>
                  </div>
                )}

                {/* ===== PDF download ===== */}
                <button className="btn-pdf" onClick={handlePDF}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                    <line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 18 15 15"/>
                  </svg>
                  Download PDF
                </button>
              </>
            );
          })()}
        </section>
      </main>

      <div className="footer">{t.copyright}</div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
