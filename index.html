<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#E85D2E" />
<title>Industry Calculator — Nardi Compressori</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23E85D2E'/><text x='50' y='64' font-family='Arial Black' font-size='38' font-weight='900' text-anchor='middle' fill='white'>N</text></svg>" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --accent:#E85D2E;
    --accent-dark:#C24620;
    --accent-light:#FFF1EA;
    --beige:#FAF3E8;
    --beige-dark:#B88543;
    --ink:#1C1F23;
    --ink-soft:#4A4F57;
    --line:#E7E4DF;
    --bg:#F7F5F1;
    --white:#FFFFFF;
    --muted:#9CA1A9;
    --shadow: 0 1px 2px rgba(28,31,35,.04), 0 4px 16px rgba(28,31,35,.06);
    --radius:10px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family: "Inter","Helvetica Neue",Helvetica,Arial,sans-serif;
    font-feature-settings: "ss01","cv11","tnum";
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit}
  input,select{font-family:inherit;font-size:16px}

  .topbar{background:var(--white);border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:50}
  .topbar-inner{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:auto 1fr auto;align-items:center;padding:10px 22px;gap:18px}
  .brand-left{display:flex;align-items:center;min-width:0}
  .brand-left img{height:58px;width:auto;display:block}
  .brand-center{text-align:center;display:flex;flex-direction:column;align-items:center;gap:2px}
  .brand-center .app-title{font-size:clamp(20px,2.4vw,28px);font-weight:700;color:var(--accent);letter-spacing:-.01em;line-height:1.1;white-space:nowrap}
  .brand-center .app-sub{font-size:11px;letter-spacing:.18em;color:var(--ink-soft);font-weight:600;text-transform:uppercase;white-space:nowrap}
  .topbar-controls{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .lang-select,.unit-toggle{background:var(--white);border:1px solid var(--line);border-radius:8px;font-size:13px;color:var(--ink);cursor:pointer;height:38px}
  .lang-select{padding:0 30px 0 12px;appearance:none;-webkit-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%234A4F57' fill='none' stroke-width='1.6'/></svg>");
    background-repeat:no-repeat;background-position:right 10px center;font-weight:500;}
  .unit-toggle{padding:0;display:inline-flex;overflow:hidden}
  .unit-toggle button{border:0;background:transparent;padding:0 14px;height:100%;cursor:pointer;font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--ink-soft);transition:background .15s,color .15s;text-transform:uppercase}
  .unit-toggle button.active{background:#1C1F23;color:#fff}
  .unit-toggle button + button{border-left:1px solid var(--line)}
  .unit-toggle button.active + button{border-left-color:#1C1F23}
  @media (max-width:760px){.topbar-inner{grid-template-columns:1fr;gap:10px;padding:12px 16px}.brand-left{justify-content:flex-start}.brand-center{order:-1}.topbar-controls{justify-content:flex-end;flex-wrap:wrap}}

  .wrap{max-width:1400px;margin:0 auto;padding:22px 22px 8px;display:grid;gap:20px;grid-template-columns:minmax(340px,440px) 1fr}
  @media (max-width:880px){.wrap{grid-template-columns:1fr;padding:16px}}

  .card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
  .card h2{margin:0 0 18px;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);font-weight:700;display:flex;align-items:center;gap:10px}
  .card h2::before{content:"";width:4px;height:14px;background:var(--accent);border-radius:1px}

  .field{margin-bottom:16px}
  .field label{display:flex;justify-content:space-between;align-items:baseline;font-size:12.5px;color:var(--ink-soft);margin-bottom:6px;font-weight:600;letter-spacing:.02em}
  .field label .unit-inline{color:var(--muted);font-weight:500;font-size:11px}
  .inp{width:100%;height:44px;padding:0 14px;border:1px solid var(--line);background:var(--white);border-radius:8px;font-size:15px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
  .inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,93,46,.12)}

  /* Flow field: input + type segmented button merged */
  .flow-row{display:grid;grid-template-columns:1fr 1.3fr;gap:8px;align-items:stretch}
  .flow-row .inp{height:44px}
  .flow-seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:3px;gap:2px;height:44px}
  .flow-seg button{flex:1;border:0;background:transparent;height:100%;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--ink-soft);transition:all .15s;padding:0 8px;letter-spacing:.02em;white-space:nowrap}
  .flow-seg button.active{background:var(--accent);color:#fff;box-shadow:0 1px 2px rgba(0,0,0,.08)}

  /* Flow unit micro-toggle */
  .flow-unit-toggle{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--white);margin-left:6px}
  .flow-unit-toggle button{border:0;background:transparent;padding:3px 8px;cursor:pointer;font-size:10.5px;font-weight:700;color:var(--ink-soft);letter-spacing:.03em}
  .flow-unit-toggle button.active{background:#1C1F23;color:#fff}
  .flow-unit-toggle button + button{border-left:1px solid var(--line)}

  .models{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:4px}
  @media (max-width:520px){.models{grid-template-columns:repeat(3,1fr)}}
  .model-btn{position:relative;border:1.5px solid var(--line);background:var(--white);border-radius:8px;padding:14px 6px 12px;cursor:pointer;font-size:13px;font-weight:700;color:var(--ink);letter-spacing:.04em;transition:all .15s;text-align:center;min-height:62px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
  .model-btn:hover:not(.disabled):not(.active){border-color:var(--accent);color:var(--accent)}
  .model-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .model-btn.disabled{opacity:.35;cursor:not-allowed;background:#F4F2EE;filter:grayscale(1)}
  .model-btn.hint-green:not(.active):not(.disabled){background:#e7f6ee;border-color:#22a065;color:#1a7a4a}
  .model-btn.hint-yellow:not(.active):not(.disabled){background:#fef9e6;border-color:#c9960f;color:#7a5c00}

  .results-empty{padding:48px 20px;text-align:center;color:var(--muted);border:1.5px dashed var(--line);border-radius:var(--radius)}
  .results-empty svg{margin-bottom:10px;opacity:.5}

  .model-list{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .model-row{display:grid;grid-template-columns:1fr auto;align-items:center;padding:14px 16px;border:1px solid var(--line);border-radius:8px;background:var(--bg);transition:all .12s}
  .model-row.clickable{cursor:pointer}
  .model-row.clickable:hover:not(.best){border-color:var(--accent);background:#FDF8F4}
  .model-row.best{border-color:var(--accent);background:var(--accent-light);box-shadow:0 0 0 2px rgba(232,93,46,.15)}
  .model-row .mname{font-weight:700;font-size:14.5px;letter-spacing:.02em}
  .model-row .mmeta{font-size:12px;color:var(--ink-soft);margin-top:2px;line-height:1.5}
  .model-row .mqty{font-size:13px;font-weight:700;color:var(--accent);background:#fff;padding:6px 10px;border-radius:6px;border:1px solid var(--accent)}
  .model-row .reducer-tag{display:inline-block;margin-top:4px;background:var(--beige);color:var(--beige-dark);font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;border-left:3px solid var(--beige-dark)}
  .model-row .buffer-tag{display:inline-block;margin-top:4px;background:#EFF4FB;color:#214469;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;border-left:3px solid #3B7AC9}

  .kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
  @media (max-width:1100px){.kpi-grid{grid-template-columns:repeat(2,1fr)}}
  @media (max-width:520px){.kpi-grid{grid-template-columns:1fr}}
  .kpi{padding:14px;background:var(--bg);border:1px solid var(--line);border-radius:8px}
  .kpi .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);font-weight:600}
  .kpi .val{font-size:20px;font-weight:700;margin-top:4px;letter-spacing:-.01em;line-height:1.15}
  .kpi .val small{font-size:11.5px;font-weight:500;color:var(--muted);margin-left:3px}

  .note{margin-top:14px;padding:12px 14px;background:#FFF9F3;border-left:3px solid var(--accent);border-radius:4px;font-size:13px;color:var(--ink-soft);line-height:1.5}
  .note.warn{background:#FFF4F0;border-left-color:#D14343;color:#8A2323}
  .note.beige{background:var(--beige);border-left:3px solid var(--beige-dark);color:#6E4F20}

  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink-soft);font-weight:700;margin:18px 0 8px}

  .footer{max-width:1400px;margin:20px auto 34px;padding:0 22px;color:var(--muted);font-size:12px;text-align:center;letter-spacing:.03em}

  /* Buffer scenario grids — responsive */
  .buf-2col{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
  @media(max-width:600px){.buf-2col{grid-template-columns:1fr}}
  .buf-5col{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:8px}
  @media(max-width:960px){.buf-5col{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:520px){.buf-5col{grid-template-columns:repeat(2,1fr)}}

  /* Mobile: flow input row stacks vertically */
  @media(max-width:480px){
    .flow-row{grid-template-columns:1fr}
    .flow-row .flow-seg{height:42px}
    .kpi .val{font-size:17px}
    .wrap{padding:10px}
    .card{padding:16px}
  }
  /* Ensure topbar logo is smaller on mobile */
  @media(max-width:480px){.brand-left img{height:44px}}

  /* ── Synoptic diagram ── */
  .synoptic{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px 16px 10px;background:var(--white);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
  /* Outer label columns are non-flex so the schema sits centered as a group;
     they take only the room they need rather than absorbing all free space
     (which previously pushed the assembly hard against the right edge). */
  .syn-side{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0}
  .syn-side.left{align-items:flex-end;padding-right:8px}
  .syn-side.right{align-items:flex-start;padding-left:8px}
  .syn-p{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap}
  .syn-q{font-size:12px;font-weight:600;color:var(--accent);white-space:nowrap}
  .syn-lbl{font-size:10px;color:var(--ink-soft);letter-spacing:.02em;white-space:nowrap}
  .syn-arrow{flex:0 0 auto;display:flex;align-items:center}
  .syn-arrow svg .arr-line{stroke-dasharray:10 5;animation:syn-flow 1s linear infinite}
  @keyframes syn-flow{from{stroke-dashoffset:30}to{stroke-dashoffset:0}}
  .syn-img-wrap{flex:0 0 auto;display:flex;align-items:center;justify-content:center;padding:0 4px}
  .syn-img{height:100px;width:auto;object-fit:contain;display:block}
  .syn-rack-wrap{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;padding:0 4px;gap:2px}
  /* Inline output labels (between booster and rack) — flex:0 0 auto so they don't stretch */
  .syn-side.inline-mid{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 6px;min-width:0}
  .syn-rack{display:block}
  .syn-rack-lbl{font-size:10.5px;font-weight:700;color:#1a5028;white-space:nowrap;letter-spacing:.01em}
  @media(max-width:560px){.synoptic{flex-wrap:wrap;gap:6px;justify-content:center}.syn-side{align-items:center!important;padding:0!important}.syn-img{height:60px}.syn-arrow svg{width:30px}.syn-rack{width:54px;height:68px}}
  /* ── Cylinder rack (BON2) section ── */
  .cyl-section{margin-top:14px;padding:14px 16px;background:#F4F8F5;border:1px solid #C9DFCB;border-radius:var(--radius)}
  .cyl-grid{display:grid;grid-template-columns:1fr 1fr 1.6fr;gap:12px;align-items:end}
  .cyl-input-block{display:flex;flex-direction:column;gap:4px}
  .cyl-label{font-size:12px;font-weight:600;color:#2d5a3d;letter-spacing:.02em}
  .cyl-label small{font-weight:400;color:var(--muted)}
  .cyl-input{height:38px;padding:0 10px;border:1.5px solid #B5D2BB;border-radius:6px;font-size:15px;font-weight:600;color:var(--ink);background:#fff;width:100%;box-sizing:border-box}
  .cyl-input:focus{outline:none;border-color:#2D7A46;box-shadow:0 0 0 3px rgba(45,122,70,.15)}
  .cyl-result{background:#fff !important;border:1px solid #C9DFCB !important}
  .cyl-note{font-size:11.5px;color:#5a7a63;margin-top:8px;font-style:italic}
  @media(max-width:560px){.cyl-grid{grid-template-columns:1fr 1fr;gap:10px}.cyl-result{grid-column:1 / -1}}
  .syn-reducer{display:flex;flex-direction:column;align-items:center;gap:2px;flex:0 0 auto}
  .syn-reducer-lbl{font-size:9px;font-weight:700;color:var(--beige-dark);white-space:nowrap;text-align:center}
  .syn-buf-strip{display:flex;align-items:center;flex-wrap:wrap;gap:10px;padding:7px 14px;background:#EFF4FB;border-radius:0 0 8px 8px;border-top:1px solid #ccdcf0;font-size:11.5px;margin-top:-2px}
  .syn-buf-strip .buf-kv{display:flex;flex-direction:column;align-items:center;gap:1px}
  .syn-buf-strip .buf-v{font-weight:700;color:#1a3a5c;font-size:12.5px}
  .syn-buf-strip .buf-k{font-size:10px;color:#4a6a8c;letter-spacing:.02em}
  /* Model dropdown */
  .model-select-wrap{margin-bottom:12px}
  .model-select-wrap label{font-size:10.5px;font-weight:700;letter-spacing:.05em;color:var(--ink-soft);text-transform:uppercase;display:block;margin-bottom:5px}
  .model-select-wrap select{width:100%;height:38px;border:1px solid var(--line);border-radius:8px;padding:0 10px;font-size:13px;background:var(--white);color:var(--ink);cursor:pointer;outline:none}
  .model-select-wrap select:focus{border-color:var(--accent)}
  /* PDF button */
  .btn-pdf{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--ink);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;transition:background .12s}
  .btn-pdf:hover{background:#2a2a2a}
  .btn-pdf svg{flex-shrink:0}
</style>
</head>

const BAR_TO_PSI = 14.5038;
const M3H_TO_CFM = 0.588578;
const M3H_TO_CFH = 35.3147;
const M3H_TO_LPM = 1000/60;  // 16.6667
const KW_TO_HP   = 1.34102;

const toMetric = {
  pressure:(v,u)=> u==="imperial" ? v/BAR_TO_PSI : v,
};
const fromMetric = {
  pressure:(v,u)=> u==="imperial" ? v*BAR_TO_PSI : v,
  power:   (v,u)=> u==="imperial" ? v*KW_TO_HP  : v,
};
// Flow conversion: works with user-selected flow unit (independent of SI/imperial toggle)
const flowFromM3H = (v_m3h, flowUnit) => {
  switch(flowUnit){
    case "m3h": return v_m3h;
    case "lpm": return v_m3h * M3H_TO_LPM;
    case "cfm": return v_m3h * M3H_TO_CFM;
    case "cfh": return v_m3h * M3H_TO_CFH;
    default: return v_m3h;
  }
};
const flowToM3H = (v, flowUnit) => {
  switch(flowUnit){
    case "m3h": return v;
    case "lpm": return v / M3H_TO_LPM;
    case "cfm": return v / M3H_TO_CFM;
    case "cfh": return v / M3H_TO_CFH;
    default: return v;
  }
};

/* =============================================================
   INTERPOLATION HELPERS
   ============================================================= */
function interpAtKey(row, pValue, cols){
  const avail = cols.map(c => ({p:c.p,v:row[c.key]})).filter(x => typeof x.v === "number");
  if (!avail.length) return null;
  if (pValue <= avail[0].p) return avail[0].v;
  if (pValue >= avail[avail.length-1].p) return avail[avail.length-1].v;
  for (let i=0;i<avail.length-1;i++){
    const a=avail[i], b=avail[i+1];
    if (pValue>=a.p && pValue<=b.p){
      const t=(pValue-a.p)/(b.p-a.p);
      return a.v + t*(b.v-a.v);
    }
  }
  return null;
}
function fadCMCB(row, pDisch){
  const cols=[{p:10,key:"p10"},{p:20,key:"p20"},{p:30,key:"p30"},{p:40,key:"p40"},{p:50,key:"p50"},{p:60,key:"p60"},{p:70,key:"p70"},{p:80,key:"p80"}];
  // Don't error if pDisch > max: model still usable with downstream reducer conceptually, but practically CM/CB
  // are bought per tier; we only allow up to the tier max. If above the tier, return null.
  if (pDisch > row.max) return null;
  return interpAtKey(row, pDisch, cols);
}
function fadBM(row, pIntake){
  const cols=[{p:4,key:"p4"},{p:5,key:"p5"},{p:6,key:"p6"},{p:7,key:"p7"},{p:8,key:"p8"},{p:9,key:"p9"},{p:10,key:"p10"},{p:11,key:"p11"},{p:12,key:"p12"}];
  return interpAtKey(row, pIntake, cols);
}
function fadBON2(row, pIntake){
  const cols=[];
  for (let i=1;i<=15;i++){ const k="p"+i; if (row[k]!==undefined) cols.push({p:i,key:k}); }
  return interpAtKey(row, pIntake, cols);
}

/* =============================================================
   FAMILY COMPATIBILITY
   All 5 families remain selectable as long as the pressure windows
   have non-empty overlap with achievable specs (allowing upstream /
   downstream reducers). CM stays atmospheric-only since "libera".
   ============================================================= */
function familyCompatible(fam, pIn_bar, pOut_bar){
  switch(fam){
    case "CM":   return pIn_bar <= 0.1  && pOut_bar >= 0 && pOut_bar <= 80;   // atmospheric only
    case "CB":   return pIn_bar >= 0.02 && pOut_bar >= 0 && pOut_bar <= 80;   // upstream reducer applied when pIn > 0.5
    case "BM":   return pIn_bar >= 4    && pOut_bar >= 0 && pOut_bar <= 80;   // upstream reducer applied when pIn > 12
    case "CNG":  return pIn_bar >= 0.02 && pOut_bar >= 0 && pOut_bar <= CNG_DISCH_NOMINAL;   // upstream reducer when pIn > 0.5
    case "BON2": return pIn_bar >= 1    && pOut_bar >= 0 && pOut_bar <= BON2_DISCH_NOMINAL;  // upstream reducer when pIn > model max
    default: return false;
  }
}
// Native intake range per family (no upstream reducer needed within this range)
const FAM_NATIVE = {CM:{min:0,max:0.1},CB:{min:0.02,max:0.5},CNG:{min:0.02,max:0.5},BM:{min:4,max:12},BON2:{min:1,max:15}};

/* =============================================================
   BUFFER TANK SIZING (BM, BON2)
   Logica: se la macchina aspira più del supply, pressione cala.
   Per evitare pressioni di pareggio troppo basse si installa un buffer
   tra P_max (pressione nominale impianto) e P_min (P_min aspirazione modello).
   La macchina lavora a intermittenza, max 8 avviamenti/ora.
   - V_buffer * (P_max_abs - P_min_abs) = m_utile [Nm3]
     dove m_utile è espressa in Nm3 a pressione atmosferica.
   - Tempo riempimento (macchina ferma): t_fill = m_utile / Q_supply
   - Tempo svuotamento (macchina attiva): t_empty = m_utile / (Q_macchina_Nm3h - Q_supply)
   - T_cycle = t_fill + t_empty
   - Vincolo: T_cycle >= 3600/8 s = 450 s (8 avviamenti/h)
   - Cerchiamo il V_buffer minimo che rispetta T_cycle >= 450 s.
   
   Input:
     Q_supply_m3h: fornitura impianto (m3/h a P_nom)
     Q_machine_m3h: aspirata totale macchina (m3/h a P_nom)  
     pNom_bar: pressione nominale impianto (relativa)
     pMin_bar: pressione minima aspirazione modello (relativa)
   Output: {volume_L, tFill_s, tEmpty_s, tCycle_s, startsPerHour} oppure null.
   ============================================================= */
function computeBufferTank(Q_supply_m3h, Q_machine_m3h, pNom_bar, pMin_bar){
  const ATM = 1.01325;
  if (Q_machine_m3h <= Q_supply_m3h + 1e-6) return null;
  const Qs_Nm3h = Q_supply_m3h * (pNom_bar + ATM) / ATM;
  const Qm_Nm3h = Q_machine_m3h * (pNom_bar + ATM) / ATM;
  const T_cycle_min_s = 3600 / MAX_STARTS_PER_HOUR;
  const pMaxAbs = pNom_bar + ATM;
  const pMinAbs = Math.max(0.1, pMin_bar + ATM);
  // If there's no pressure headroom (nominal equals model min), buffer impossible:
  // signal with a special "infeasible" flag so UI can warn.
  const deltaP = pMaxAbs - pMinAbs;
  if (deltaP < 0.3) {
    return { infeasible: true, pMinIntake_bar: pMin_bar, pMaxIntake_bar: pNom_bar };
  }
  const m_utile_min_Nm3 = (T_cycle_min_s/3600) * (Qs_Nm3h * (Qm_Nm3h - Qs_Nm3h)) / Qm_Nm3h;
  const V_m3 = m_utile_min_Nm3 * ATM / deltaP;
  const V_L_computed = V_m3 * 1000;
  const commercialSizes_L = [50,100,150,200,270,500,750,1000,1500,2000,3000,5000,8000,10000];
  let V_L = commercialSizes_L.find(s => s >= V_L_computed);
  if (V_L == null) V_L = Math.ceil(V_L_computed / 1000) * 1000;
  const V_chosen_m3 = V_L / 1000;
  const m_utile_Nm3 = V_chosen_m3 * deltaP / ATM;
  const tFill_h = m_utile_Nm3 / Qs_Nm3h;
  const tEmpty_h = m_utile_Nm3 / (Qm_Nm3h - Qs_Nm3h);
  const tCycle_h = tFill_h + tEmpty_h;
  return {
    volume_L: V_L,
    volume_L_computed: V_L_computed,
    tFill_s: tFill_h*3600,
    tEmpty_s: tEmpty_h*3600,
    tCycle_s: tCycle_h*3600,
    startsPerHour: 1/tCycle_h,
    pMinIntake_bar: pMin_bar,
    pMaxIntake_bar: pNom_bar,
  };
}

/* =============================================================
   BUFFER SIZING — nuova logica per BM / BON2 con toggle utente
   - Isteresi lato mandata: BUFFER_DELTA_P_BAR (5 bar)
   - portata_aspirata  = fornitura impianto (Q_supply) in Nm³/h
   - portata_media_asp = media tra flusso macchina ad alta e bassa pressione aspirazione
   - t_fill  = V_usabile / portata_aspirata
   - t_empty = V_usabile / (portata_media_asp – portata_aspirata)
   - cicli/h ≤ 8 vincolo dimensionante
   - Taglie commerciali metriche: 270, 500, 725, 1000, 1500, 2000 L
   ============================================================= */
// Q_utente_inlet = portata aspirata utente [Nm³/h]
// Q_media_inlet  = portata aspirata media booster (ciclo completo) [Nm³/h]
// dP_inlet       = P_avvio − P_arresto [bar]
// Formule (Excel):
//   t_fill  [min] = V_L × dP / (Q_utente_inlet          × 1000/60)
//   t_empty [min] = V_L × dP / ((Q_media − Q_utente)    × 1000/60)
function computeBufferNew(Q_utente_inlet, Q_media_inlet, dP_inlet, units){
  const Qs = Q_utente_inlet;
  const Qm = Q_media_inlet;
  const dQ = Qm - Qs;
  if (dQ <= 1e-6) return null;
  const dP = dP_inlet;
  const F  = 1000/60; // converte m³/h → L/min
  // Mass-balance formulas (consistent units):
  //   t_fill_min  = V_L × dP / (Qs × F)     [riempimento da rete]
  //   t_empty_min = V_L × dP / (dQ × F)     [svuotamento: portata media booster − portata rete]
  //   t_cycle_min = V_L × dP × (1/Qs + 1/dQ) / F
  //   V_min from t_cycle = T_min_min:
  //     V_min = T_min_min × F / (dP × (1/Qs + 1/dQ))
  const T_min_min = 60 / MAX_STARTS_PER_HOUR;
  const V_min_L = T_min_min * F / (dP * (1/Qs + 1/dQ));
  let V_L;
  if (units === "imperial") {
    const gal_min = V_min_L / GAL_TO_L;
    const gal = BUFFER_SIZES_GAL.find(s => s >= gal_min);
    V_L = gal != null ? Math.round(gal * GAL_TO_L) : Math.ceil(V_min_L / 500) * 500;
  } else {
    V_L = BUFFER_SIZES_L.find(s => s >= V_min_L);
    if (V_L == null) V_L = Math.ceil(V_min_L / 500) * 500;
  }
  const tFill_s  = V_L * dP / (Qs * F) * 60;
  const tEmpty_s = V_L * dP / (dQ * F) * 60;
  const tCycle_s = tFill_s + tEmpty_s;
  return {
    volume_L: V_L, volume_L_computed: V_min_L,
    tFill_s, tEmpty_s, tCycle_s,
    startsPerHour: 3600 / tCycle_s,
  };
}

/* =============================================================
   CORE COMPUTATION per family
   Returns rows with:
     fadSingle (m3/h effective aspirated per machine at intake conditions)
     qInletSingle (m3/h theoretical intake per machine)
     reducerUpstream / reducerDownstream (bar values for beige tags)
     showBalance (BM + BON2 only)
   ============================================================= */
function computeFamily(fam, pIn_bar_user, pOut_bar, flowRequested_m3h_inlet){
  // etaV: 0.90 CM/CB/BM, 0.95 BON2/CNG
  const etaV = (fam==="BON2" || fam==="CNG") ? 0.95 : 0.90;
  // flowRequested_m3h_inlet is THEORETICAL aspirated volumetric flow (Portata in ingresso)
  // FAD = etaV * flowRequested_m3h_inlet
  const fadRequested = flowRequested_m3h_inlet * etaV;
  const ATM = 1.01325;

  let rows = [];

  if (fam==="CM" || fam==="CB"){
    // Pick tier: smallest tier >= pOut; if pOut=0, use 40-tier and propose downstream reducer.
    const targetMax = pOut_bar <= 40 ? 40 : pOut_bar <= 60 ? 60 : 80;
    const pOutEff = Math.min(pOut_bar, targetMax);
    const downstreamReducer = pOut_bar < 10; // flag anything below 10 bar as needing downstream reducer
    // Actually: we show downstreamReducer flag if user pOut < tier_representative_min.
    // Simpler: if we computed FAD at an "extrapolated" low pressure, note it.
    // For CM/CB we interpolate from 10 bar upward; below 10, clamp to 10 and flag downstream reducer.
    const pForInterp = Math.max(10, pOut_bar); // clamp for interpolation
    const needsDownstream = pOut_bar < 10;

    const machineIntakeMax = fam==="CM" ? 0.0 : 0.5;
    const pInEff = fam==="CM" ? 0 : Math.min(pIn_bar_user, machineIntakeMax);
    const needsUpstream = fam==="CB" && pIn_bar_user > machineIntakeMax;

    rows = CM_CB_TABLE
      .filter(r => r.max === targetMax)
      .map(r => {
        const fad = fadCMCB(r, pForInterp);
        if (fad == null) return null;
        const qInlet = fad / etaV;
        return {
          model: fam + r.m, fadSingle: fad, qInletSingle: qInlet, kW: r.kW,
          pInEffective: pInEff,
          reducerUpstream: needsUpstream ? machineIntakeMax : null,
          reducerDownstream: needsDownstream ? pOut_bar : null,
          machineIntakeMax, machineDischNominal: targetMax,
          showBalance: false,
        };
      })
      .filter(Boolean);
  }
  else if (fam==="BM"){
    const targetMax = pOut_bar <= 40 ? 40 : pOut_bar <= 60 ? 60 : 80;
    const pForInterp = Math.max(10, pOut_bar); // discharge — clamp to 10 for interpolation (BM tables are per intake, not per discharge)
    // BM tables are indexed by intake; discharge only used to pick tier.
    const pInForInterp = Math.max(BM_INTAKE_MIN, Math.min(pIn_bar_user, BM_INTAKE_MAX));
    const needsUpstream = pIn_bar_user > BM_INTAKE_MAX;
    const needsDownstream = pOut_bar < 10;

    rows = BM_TABLE
      .filter(r => r.max === targetMax)
      .map(r => {
        const fad = fadBM(r, pInForInterp);
        if (fad == null) return null;
        const qInlet = fad / etaV;
        return {
          model: r.m_label || r.m, fadSingle: fad, qInletSingle: qInlet, kW: r.kW,
          pInEffective: pInForInterp,
          reducerUpstream: needsUpstream ? BM_INTAKE_MAX : null,
          reducerDownstream: needsDownstream ? pOut_bar : null,
          machineIntakeMax: BM_INTAKE_MAX, machineIntakeMin: BM_INTAKE_MIN, machineDischNominal: targetMax,
          showBalance: true, family: "BM",
          regA: r.regA, regB: r.regB,
          fadFn: (p) => fadBM(r, Math.max(BM_INTAKE_MIN, Math.min(p, BM_INTAKE_MAX))),
        };
      })
      .filter(Boolean);
  }
  else if (fam==="CNG"){
    const needsUpstream = pIn_bar_user > CNG_INTAKE_MAX;
    const pInEff = Math.min(pIn_bar_user, CNG_INTAKE_MAX);
    // CNG can be set to any discharge pressure: never indicate a downstream reducer.
    const needsDownstream = false;
    rows = CNG_TABLE.map(r => ({
      model: r.m, fadSingle: r.flow_m3h, qInletSingle: r.flow_m3h / etaV, kW: r.kW,
      pInEffective: pInEff,
      reducerUpstream: needsUpstream ? CNG_INTAKE_MAX : null,
      reducerDownstream: needsDownstream ? pOut_bar : null,
      machineIntakeMax: CNG_INTAKE_MAX, machineDischNominal: CNG_DISCH_NOMINAL,
      showBalance: false,
    }));
  }
  else if (fam==="BON2"){
    // For BON2 we need pOut in the machine's achievable range.
    // Nominal is 420 bar; if user pOut < 420, install downstream reducer. FAD still evaluated at intake.
    const needsDownstream = pOut_bar < BON2_DISCH_NOMINAL;
    rows = BON2_TABLE.map(r => {
      const pInEff = Math.max(r.intakeMin, Math.min(pIn_bar_user, r.intakeMax));
      const needsUpstream = pIn_bar_user > r.intakeMax;
      const belowMin = pIn_bar_user < r.intakeMin;
      if (belowMin) return null; // cannot operate
      const fad = fadBON2(r, pInEff);
      if (fad == null) return null;
      const qInlet = fad / etaV;
      return {
        model: r.m, fadSingle: fad, qInletSingle: qInlet, kW: r.kW != null ? r.kW : null,
        pInEffective: pInEff,
        reducerUpstream: needsUpstream ? r.intakeMax : null,
        reducerDownstream: needsDownstream ? pOut_bar : null,
        machineIntakeMax: r.intakeMax, machineIntakeMin: r.intakeMin,
        machineDischNominal: BON2_DISCH_NOMINAL,
        showBalance: true, family: "BON2",
        regA: r.regA, regB: r.regB,
        fadFn: (p) => fadBON2(r, Math.max(r.intakeMin, Math.min(p, r.intakeMax))),
      };
    }).filter(Boolean);
  }

  if (!rows.length) return { error:"fadOutOfRange" };

  const sized = rows.map(r => {
    const n = Math.max(1, Math.ceil(fadRequested / r.fadSingle));
    const fadTotal = n * r.fadSingle;
    const qInletTotal = n * r.qInletSingle;
    const kWtotal = r.kW != null ? n * r.kW : null;
    let pEqGauge = null;
    let pEqSaturated = false;
    let bufferInfo = null;
    if (r.showBalance){
      const pMaxAbs = r.machineIntakeMax + ATM;
      if (r.fadFn) {
        if (r.regA != null) {
          // Usa la regressione lineare Q = regA×P + regB per trovare P_eq:
          // P_eq = (Q_richiesta_singola - regB) / regA
          // Questo funziona anche per pressioni sotto il minimo della macchina (estrapolazione)
          pEqGauge = (fadRequested / n - r.regB) / r.regA;
          if (pEqGauge > pIn_bar_user){ pEqGauge = pIn_bar_user; pEqSaturated = true; }
        } else {
          // Bisezione sull'interpolazione tabellare (fallback per macchine senza regressione)
          const pMin_intake = r.machineIntakeMin != null ? r.machineIntakeMin : 0;
          let lo = pMin_intake, hi = pIn_bar_user;
          for (let iter = 0; iter < 80; iter++) {
            const mid = (lo + hi) / 2;
            if (r.fadFn(mid) * n < fadRequested) lo = mid; else hi = mid;
          }
          pEqGauge = (lo + hi) / 2;
          if (pEqGauge > pIn_bar_user){ pEqGauge = pIn_bar_user; pEqSaturated = true; }
        }
      } else {
        const pNomAbs = pIn_bar_user + ATM;
        let pEqAbs = (fadRequested * pNomAbs) / fadTotal;
        if (pEqAbs > pMaxAbs){ pEqAbs = pMaxAbs; pEqSaturated = true; }
        pEqGauge = pEqAbs - ATM;
      }
      
      // Buffer tank check: se P_eq negativa => obbligatorio; se >= 2 bar sotto aspirazione (ma >= 0) => consigliato
      const isNegative = pEqGauge < 0;
      const isLow = (pIn_bar_user - pEqGauge) >= BUFFER_TRIGGER_DELTA_BAR;
      const needsBuffer = isNegative || isLow;
      if (needsBuffer){
        const pMinModel = r.machineIntakeMin != null ? r.machineIntakeMin : (r.machineIntakeMax > 4 ? 4 : 1);
        bufferInfo = computeBufferTank(fadRequested, fadTotal, pIn_bar_user, pMinModel);
        if (bufferInfo){
          bufferInfo.level = isNegative ? "required" : "recommended";
        }
      }
    }
    // Calcola flussi alle pressioni di aspirazione ±0.2 bar e pareggio ±0.2 bar per scenario CON buffer (BM/BON2)
    let bufferFlows = null;
    if (r.fadFn && pEqGauge != null && (pIn_bar_user - pEqGauge) > 0.5) {
      // When an upstream reducer is needed, the buffer's max pressure equals the booster's max intake
      const pHigh = r.reducerUpstream != null ? r.reducerUpstream : pIn_bar_user - 0.2;
      const pLow  = pEqGauge + 0.2;
      const fadAtHighSingle = r.fadFn(pHigh);
      const fadAtHigh = fadAtHighSingle * n;
      // Portata resa di arresto: regressione lineare Q = a×P_arresto + b, tetto a Q_avvio
      // Equivalente a =SE(regressione*pLow > Q_avvio; Q_avvio; regressione*pLow)
      const fadAtLow  = (r.regA != null)
        ? Math.min(Math.max(0, r.regA * pLow + r.regB), fadAtHighSingle) * n
        : Math.min(r.fadFn(pLow), fadAtHighSingle) * n;
      const fadAtEq   = r.fadFn(pEqGauge) * n;
      bufferFlows = {
        pHigh, pLow, pEqGauge,
        fadAtHigh,  qInletAtHigh:  fadAtHigh / etaV,
        fadAtLow,   qInletAtLow:   fadAtLow  / etaV,
        fadAvg:    (fadAtHigh + fadAtLow) / 2,
        qInletAvg: (fadAtHigh + fadAtLow) / 2 / etaV,
        fadAtEq,    qInletAtEq:    fadAtEq / etaV,
      };
    }
    return { ...r, n, fadTotal, qInletTotal, kWtotal, pEqGauge, pEqSaturated, bufferInfo, bufferFlows };
  });

  sized.sort((a,b)=>{
    if (a.n !== b.n) return a.n - b.n;
    return (a.fadTotal - fadRequested) - (b.fadTotal - fadRequested);
  });

  return { rows: sized, fadRequested, qInletRequested: flowRequested_m3h_inlet, etaV };
}

function App(){
  const [lang,setLang] = useState(() => {
    try{
      const saved = localStorage.getItem("nardi-lang");
      if (saved && LANGS[saved]) return saved;
      const nav = (navigator.language||"").slice(0,2);
      return LANGS[nav] ? nav : "it";
    }catch(e){ return "it"; }
  });
  const [units,setUnits] = useState(() => {
    try{
      const saved = localStorage.getItem("nardi-units");
      return saved==="imperial" ? "imperial" : "metric";
    }catch(e){ return "metric"; }
  });
  const [flowUnit,setFlowUnit] = useState(() => {
    try{
      const saved = localStorage.getItem("nardi-flow-unit");
      const metricDefault = "m3h", imperialDefault = "cfm";
      const isImperial = localStorage.getItem("nardi-units")==="imperial";
      const metricSet = ["m3h","lpm"], imperialSet = ["cfm","cfh"];
      // Only honour the saved flowUnit if it belongs to the active unit system,
      // otherwise fall back to the system default to keep units self-consistent.
      if (saved && (isImperial ? imperialSet : metricSet).includes(saved)) return saved;
      return isImperial ? imperialDefault : metricDefault;
    }catch(e){ return "m3h"; }
  });
  const t = T[lang];
  const tip = TIP[lang] || TIP.en;

  useEffect(()=>{ try{localStorage.setItem("nardi-lang",lang)}catch(e){}
    document.documentElement.dir = lang==="ar"?"rtl":"ltr";
    document.documentElement.lang = lang;
  },[lang]);
  useEffect(()=>{ try{localStorage.setItem("nardi-units",units)}catch(e){} },[units]);
  useEffect(()=>{ try{localStorage.setItem("nardi-flow-unit",flowUnit)}catch(e){} },[flowUnit]);

  const [pIn,setPIn] = useState("");
  const [pOut,setPOut] = useState("");
  const [flowType,setFlowType] = useState("aspirated"); // "aspirated" = Portata in ingresso; "delivered" = FAD
  const [flow,setFlow] = useState("");
  const [selectedFamily,setSelectedFamily] = useState(null);
  const [selectedModel,setSelectedModel] = useState(null);
  const [bufferEnabled,setBufferEnabled] = useState(true); // toggle CON/SENZA buffer (solo BM/BON2)
  const [selectedBufferSize,setSelectedBufferSize] = useState(null); // null = usa taglia minima calcolata
  // ── Storage / accumulation add-on (cylinder rack OR delivery tank) ──
  // Single toggle that gates BOTH the cylinder-rack section (BON2 / BM > 48 bar)
  // AND the delivery-tank section (BM ≤ 48 bar).  Customers don't always want it.
  const [addonEnabled,setAddonEnabled] = useState(true);

  // BON2 / BM>48 cylinder-rack filling parameters (defaults: typical 12 × 50 L pack)
  const [cylN,setCylN] = useState("12");
  const [cylV,setCylV] = useState("50");
  // Restart pressure (bar gauge): minimum cylinder pressure at which the booster
  // must reactivate to refill the rack. Empty string => use default (= 250 barg, capped at pOut-1).
  const [cylRestart,setCylRestart] = useState("");
  // Customer flow consumption from the rack while booster is refilling.
  // Empty string = 0 (no consumption).  When > 0 it slows the refill; when
  // ≥ booster FAD the refill cannot complete and the UI shows "-:--".
  const [cylConsumed,setCylConsumed] = useState("");

  // BM ≤48 bar delivery-tank parameters.  Same UX as cylinder rack:
  //   - Volume selectable from {500, 1000, 1500, 2000, 3000} L (default 1000 L).
  //   - Restart pressure: empty => default (pOut − 5 bar, capped at pOut − 1).
  //   - Consumed flow: empty => no consumption (empty time + starts/h shown as "—").
  const [dlvV,setDlvV] = useState("1000");
  const [dlvRestart,setDlvRestart] = useState("");
  const [dlvConsumed,setDlvConsumed] = useState("");

  // === Unit-toggle handlers (BUG-01 fix): convert displayed values when toggling SI<->IMP or flow unit ===
  // Round-trip-safe number formatting: keeps enough decimals so converting
  // back to the source unit yields the original input within ±0.5%.
  // Pressure: 3 dp for bar/MPa; 2 dp for psig/psia (psig step ≈ 0.069 bar so 2 dp keeps ≥3 sig figs).
  // Flow: 3 dp for m3h/cfm; 1 dp for lpm/cfh (those are already large numbers, 1 dp is enough).
  const fmtNum = (n, dp) => {
    if (!Number.isFinite(n)) return "";
    const f = Math.pow(10, dp);
    return (Math.round(n * f) / f).toString();
  };
  const handleSetUnits = (newU) => {
    if (newU === units) return;
    const oldU = units;
    const convP = (s) => {
      if (s === "" || isNaN(parseFloat(s))) return s;
      const inBar = toMetric.pressure(parseFloat(s), oldU);
      const out   = fromMetric.pressure(inBar, newU);
      // Imperial pressure (psig) → 2 dp keeps ≈ ±0.034 bar precision.
      // Metric pressure (bar)   → 3 dp keeps ±0.0005 bar (≈ 0.007 psi) precision.
      return fmtNum(out, newU === "imperial" ? 2 : 3);
    };
    setPIn(convP(pIn));
    setPOut(convP(pOut));
    // Cross-system flow conversion (m3h/lpm <-> cfm/cfh) — pick a sensible default per system.
    const metricUnits = ["m3h","lpm"], imperialUnits = ["cfm","cfh"];
    let newFU = flowUnit;
    if (newU === "metric"   && imperialUnits.includes(flowUnit)) newFU = "m3h";
    if (newU === "imperial" && metricUnits.includes(flowUnit))   newFU = "cfm";
    if (newFU !== flowUnit) {
      if (flow !== "" && !isNaN(parseFloat(flow))) {
        const inM3H = flowToM3H(parseFloat(flow), flowUnit);
        const out   = flowFromM3H(inM3H, newFU);
        // m3h/cfm are small numbers (typical 1–500) → 3 dp; lpm/cfh are 60× larger → 1 dp suffices.
        const dec = (newFU === "lpm" || newFU === "cfh") ? 1 : 3;
        setFlow(fmtNum(out, dec));
      }
      setFlowUnit(newFU);
    }
    setUnits(newU);
  };
  const handleSetFlowUnit = (newFU) => {
    if (newFU === flowUnit) return;
    if (flow !== "" && !isNaN(parseFloat(flow))) {
      const inM3H = flowToM3H(parseFloat(flow), flowUnit);
      const out   = flowFromM3H(inM3H, newFU);
      const dec = (newFU === "lpm" || newFU === "cfh") ? 1 : 3;
      setFlow(fmtNum(out, dec));
    }
    setFlowUnit(newFU);
  };

  const pIn_bar  = pIn  === "" || isNaN(parseFloat(pIn))  ? null : toMetric.pressure(parseFloat(pIn),units);
  const pOut_bar = pOut === "" || isNaN(parseFloat(pOut)) ? null : toMetric.pressure(parseFloat(pOut),units);
  // Flow typed by user is in the currently-selected flowUnit.
  const flow_m3h_user = flow === "" || isNaN(parseFloat(flow)) ? null : flowToM3H(parseFloat(flow), flowUnit);

  const hasAllParams = pIn_bar!=null && pOut_bar!=null && flow_m3h_user!=null && flow_m3h_user>0;

  const families = ["CM","CB","BM","CNG","BON2"];
  const compatibility = useMemo(()=>{
    const map = {};
    families.forEach(f=>{ map[f] = hasAllParams ? familyCompatible(f, pIn_bar, pOut_bar) : true; });
    return map;
  },[hasAllParams, pIn_bar, pOut_bar]);

  // Punteggio "best fit" per ogni famiglia compatibile, considerando i 3 parametri (pIn, pOut, portata).
  // Più alto = migliore. La famiglia con il massimo punteggio (anche più di una in caso di parità) viene mostrata in verde.
  const familyFitness = useMemo(()=>{
    const map = {};
    if (!hasAllParams) return map;
    families.forEach(fam => {
      if (!compatibility[fam]) { map[fam] = -Infinity; return; }
      const etaV = (fam==="BON2"||fam==="CNG") ? 0.95 : 0.90;
      const effFlowType = fam === "CM" ? "delivered" : flowType;
      const flowReq = effFlowType === "aspirated" ? flow_m3h_user : flow_m3h_user / etaV;
      let res = null;
      try { res = computeFamily(fam, pIn_bar, pOut_bar, flowReq); } catch(e){ res = null; }
      if (!res || res.error || !res.rows || !res.rows.length) { map[fam] = -Infinity; return; }
      const top = res.rows[0];
      let score = 100;
      if (top.reducerUpstream != null)   score -= 30;  // serve riduttore in aspirazione
      if (top.reducerDownstream != null) score -= 15;  // serve riduttore in mandata
      if (top.bufferInfo && top.bufferInfo.level === "required") score -= 10;
      score -= Math.max(0, (top.n || 1) - 1) * 2;       // penalità per ogni macchina extra
      const nr = FAM_NATIVE[fam];
      if (nr && pIn_bar >= nr.min && pIn_bar <= nr.max) score += 5; // bonus pIn nativo
      map[fam] = score;
    });
    return map;
  },[hasAllParams, pIn_bar, pOut_bar, flow_m3h_user, flowType, compatibility]);

  const maxFitness = useMemo(()=>{
    const vals = Object.values(familyFitness).filter(v => v > -Infinity);
    return vals.length ? Math.max(...vals) : -Infinity;
  },[familyFitness]);

  useEffect(()=>{
    if (selectedFamily && hasAllParams && compatibility[selectedFamily] === false){
      setSelectedFamily(null);
    }
  }, [compatibility, selectedFamily, hasAllParams]);

  // Reset selectedModel when family changes or core params change
  useEffect(()=>{
    setSelectedModel(null);
  }, [selectedFamily, pIn_bar, pOut_bar, flow_m3h_user, flowType]);

  // Convert user flow input to THEORETICAL INLET flow (m³/h) in all cases.
  // If user selected "delivered" (FAD), convert back to inlet using eta_v of selected family.
  // But since etaV varies per family, and we want a globally-meaningful requested-inlet value,
  // we interpret "delivered" on a per-family basis inside computeFamily.
  // Simpler: inside computeFamily we pass the requested INLET flow always; if user typed delivered,
  // we transform here using the selected family's etaV before calling.
  const result = useMemo(()=>{
    if (!hasAllParams || !selectedFamily || !compatibility[selectedFamily]) return null;
    const etaV = (selectedFamily==="BON2"||selectedFamily==="CNG") ? 0.95 : 0.90;
    // CM: il valore inserito è sempre considerato "resa" (FAD), aspirata/resa non selezionabili
    const effectiveFlowType = selectedFamily === "CM" ? "delivered" : flowType;
    const flowRequested_inlet_m3h = effectiveFlowType==="aspirated"
      ? flow_m3h_user
      : flow_m3h_user / etaV;
    return computeFamily(selectedFamily, pIn_bar, pOut_bar, flowRequested_inlet_m3h);
  },[selectedFamily, hasAllParams, pIn_bar, pOut_bar, flow_m3h_user, flowType, compatibility]);

  // Reset buffer size to auto (minimum valid) whenever the computed result changes
  useEffect(()=>{ setSelectedBufferSize(null); }, [result]);

  const uLbl = unitLabels[units];
  // Strip trailing zeros ONLY after the decimal point — never inside integers.
  // BUG: the previous regex /\.?0+$/ ate trailing 0s of integers, so
  //      fmt(50,0)="5", fmt(250,0)="25", fmt(100,0)="1".  This produced the
  //      "Volume 5 L" PDF and "Pressione di ripartenza 25 barg" UI typos.
  const fmt = (v, d=1) => {
    if (v==null || isNaN(v)) return "—";
    const s = (+v).toFixed(d);
    return s.includes(".") ? s.replace(/\.?0+$/,"") : s;
  };
  const fmtP = v => {
    if (v == null) return "—";
    const vC = fromMetric.pressure(v, units);
    const dec = units === "imperial" ? 0 : 1;
    const vCeil = units === "imperial" ? Math.ceil(vC) : Math.ceil(vC * 10) / 10;
    return fmt(vCeil, dec) + " " + uLbl.p;
  };
  const fmtF = v_m3h => v_m3h==null ? "—" : fmt(flowFromM3H(v_m3h,flowUnit), 1) + " " + FLOW_UNIT_LBL[flowUnit];
  const fmtPw = v => v==null ? "—" : fmt(fromMetric.power(v,units),1) + " " + uLbl.pw;

  const famDesc = { CM:t.cmFull, CB:t.cbFull, BM:t.bmFull, CNG:t.cngFull, BON2:t.bon2Full };

  // Flow unit toggle options depending on SI/IMP
  const flowUnitOptions = units==="metric" ? ["m3h","lpm"] : ["cfm","cfh"];

  return (
    <>
      <header className="topbar">
        <div className="topbar-inner">
          <div className="brand-left">
            <img src={LOGO_DATA_URI} alt="Nardi Compressori" />
          </div>
          <div className="brand-center">
            <div className="app-title">{t.title}</div>
            <div className="app-sub">{t.subtitle}</div>
          </div>
          <div className="topbar-controls">
            <select className="lang-select" value={lang} onChange={e=>setLang(e.target.value)} aria-label="Language">
              {Object.entries(LANGS).map(([code,info]) =>
                <option key={code} value={code}>{info.flag} {info.name}</option>
              )}
            </select>
            <div className="unit-toggle" role="tablist">
              <button className={units==="metric"?"active":""} onClick={()=>handleSetUnits("metric")} aria-pressed={units==="metric"}>{t.metric}</button>
              <button className={units==="imperial"?"active":""} onClick={()=>handleSetUnits("imperial")} aria-pressed={units==="imperial"}>{t.imperial}</button>
            </div>
          </div>
        </div>
      </header>

      <main className="wrap">
        <section className="card">
          <h2>{t.params}</h2>

          <div className="field">
            <label><span>{t.intakeP}<InfoTip text={tip.intakeP}/></span><span className="unit-inline">{uLbl.p}</span></label>
            <input type="number" inputMode="decimal" className="inp" value={pIn}
              onChange={e=>{ const v=e.target.value; if(v==="" || parseFloat(v)>=0) setPIn(v); }}
              placeholder={t.placeholderP} step="any" min="0" />
          </div>
          <div className="field">
            <label><span>{t.dischP}<InfoTip text={tip.dischP}/></span><span className="unit-inline">{uLbl.p}</span></label>
            <input type="number" inputMode="decimal" className="inp" value={pOut}
              onChange={e=>{ const v=e.target.value; if(v==="" || parseFloat(v)>=0) setPOut(v); }}
              placeholder={t.placeholderPhigh} step="any" min="0" />
          </div>

          <div className="field">
            <label>
              <span>{t.flow}<InfoTip text={tip.flow}/></span>
              <span className="flow-unit-toggle" role="tablist">
                {flowUnitOptions.map(fu => (
                  <button key={fu}
                    className={flowUnit===fu?"active":""}
                    onClick={()=>handleSetFlowUnit(fu)}
                    aria-pressed={flowUnit===fu}
                  >{FLOW_UNIT_LBL[fu]}</button>
                ))}
              </span>
            </label>
            <div className="flow-row">
              <input type="number" inputMode="decimal" className="inp" value={flow}
                onChange={e=>{ const v=e.target.value; if(v==="" || parseFloat(v)>=0) setFlow(v); }}
                placeholder={t.placeholderFlow} step="any" min="0" />
              <div className="flow-seg">
                {(() => {
                  const cmLock = selectedFamily === "CM";
                  const ft = cmLock ? "delivered" : flowType;
                  return (<>
                    <button
                      className={ft==="aspirated"?"active":""}
                      disabled={cmLock}
                      style={cmLock?{opacity:.4,cursor:"not-allowed"}:undefined}
                      onClick={()=>{ if(!cmLock) setFlowType("aspirated"); }}>{t.aspirated}</button>
                    <button
                      className={ft==="delivered"?"active":""}
                      disabled={cmLock}
                      style={cmLock?{opacity:1,cursor:"not-allowed"}:undefined}
                      onClick={()=>{ if(!cmLock) setFlowType("delivered"); }}>{t.delivered}</button>
                  </>);
                })()}
              </div>
            </div>
          </div>

          <div className="section-title">{t.availModels}</div>
          <div className="models">
            {families.map(fam => {
              const active = selectedFamily === fam;
              const disabled = hasAllParams && !compatibility[fam];
              let hint = "";
              if (!disabled && hasAllParams && maxFitness > -Infinity) {
                const score = familyFitness[fam];
                hint = (score === maxFitness) ? " hint-green" : " hint-yellow";
              }
              return (
                <button key={fam} className={"model-btn" + (active?" active":"") + (disabled?" disabled":"") + hint} onClick={()=>{ if (!disabled) setSelectedFamily(fam); }} disabled={disabled}>{fam}</button>
              );
            })}
          </div>

          {selectedFamily && (
            <div className="note" style={{marginTop:14}}>
              <strong>{selectedFamily}</strong> — {famDesc[selectedFamily]}
            </div>
          )}
        </section>

        <section className="card">
          <h2>{t.result}</h2>

          {!hasAllParams && (
            <div className="results-empty">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M12 3v18M3 12h18" strokeLinecap="round"/></svg>
              <div>{t.enterParams}</div>
            </div>
          )}

          {pIn_bar != null && pOut_bar != null && pOut_bar <= pIn_bar && (
            <div className="note warn">{VALIDATION_POUT[lang] || VALIDATION_POUT.en}</div>
          )}

          {hasAllParams && !(pOut_bar != null && pOut_bar <= pIn_bar) && !selectedFamily && (
            <div className="results-empty">
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><circle cx="12" cy="12" r="9"/><path d="M8 12h8" strokeLinecap="round"/></svg>
              <div>{t.chooseFam}</div>
            </div>
          )}

          {hasAllParams && selectedFamily && result?.error && (
            <div className="note warn">{t.fadOutOfRange}</div>
          )}

          {hasAllParams && selectedFamily && result?.rows?.length > 0 && (() => {
            const selectedRow = selectedModel
              ? (result.rows.find(r => r.model === selectedModel) || result.rows[0])
              : result.rows[0];
            const best = selectedRow;
            const isBMBON2 = best.family === "BM" || best.family === "BON2";
            const showBalance = best.showBalance && (best.fadTotal - result.fadRequested) > 0.001;
            const anyUpstream = result.rows.some(r => r.reducerUpstream != null);
            const anyDownstream = result.rows.some(r => r.reducerDownstream != null);
            const buf = best.bufferInfo;
            const bf  = best.bufferFlows; // high/low/avg flows for buffer scenarios

            // Determina se buffer è consigliato o obbligatorio
            const bufLevel = buf ? buf.level : null; // "recommended" | "required" | null
            const bufRecommended = bufLevel === "recommended";
            const bufRequired    = bufLevel === "required";

            // Portata aspirata utente per le formule buffer
            // result.qInletRequested è sempre la portata alla bocca di aspirazione (teorica),
            // indipendentemente dal flowType scelto dall'utente — usare sempre questo valore.
            const Q_utente_inlet = result.qInletRequested;
            const dP_inlet = bf ? (bf.pHigh - bf.pLow) : 0;

            // ── Verifica fattibilità buffer (≤ 1500 L) ──
            // Se il volume minimo richiesto supera 1500 L, non proporre la soluzione con buffer:
            // si forza la modalità "senza buffer" e si nasconde il toggle.
            let bufferFeasible = true;
            if (bf && isBMBON2) {
              const _Qs = Q_utente_inlet, _Qm = bf.qInletAvg;
              const _dQ = _Qm - _Qs;
              if (_dQ > 1e-6 && dP_inlet > 0) {
                const _F = 1000/60;
                const _Tmin = 60 / MAX_STARTS_PER_HOUR;
                const _Vmin = _Tmin * _F / (dP_inlet * (1/_Qs + 1/_dQ));
                bufferFeasible = _Vmin <= 1500;
              }
            }
            const effectiveBufferOn = bufferEnabled && bufferFeasible;
            // Toggle visibile solo se il buffer è effettivamente fattibile (≤ 1500 L).
            const showBufferToggle = isBMBON2 && bf != null && bufferFeasible;
            const isBON2 = best.family === "BON2";

            let newBuf = null; // calcolato sotto nella sezione CON buffer

            // === Cylinder-rack filling (BON2 always; BM only when pOut > 48 bar) ===
            // For BM at low pressure (≤ 48 bar) the standard buffer-tank logic
            // (500/1000/1500/2000 L) applies instead — the rack is irrelevant.
            //
            // Use the average delivered flow over the operating cycle:
            //  - if buffer ON: use bf.fadAvg (cycle average, more realistic)
            //  - else: use best.fadTotal (steady-state delivered flow at requested pIn)
            //
            // Fill-time formula (validated against Nardi BON2-140-350 test case):
            //   t [h] = (N * V_L / 1000) * ΔP / FAD_net / etaV
            //   where  ΔP        = full fill: pOut_bar  (from empty)
            //                      refill   : pOut_bar - pStart_bar
            //          FAD_net   = booster FAD − customer consumption
            //                      (if customer consumes part of the rack output
            //                       while the booster is filling, the net inflow
            //                       to the rack is reduced)
            //          pStart    = user-set restart pressure (default 250 barg)
            //          etaV      = 0.95 BON2/CNG, 0.90 CM/CB/BM
            //
            // Test case (BON2): 16 × 50 L, ΔP = 300 bar, FAD = 20 m³/h, etaV = 0.95
            //   → (16*50/1000)*300/20/0.95 = 12.63 h = 12h 38m  ✓
            //
            // When customer consumption ≥ booster FAD, the rack cannot ever refill
            // → t_s_refill = Infinity → UI/PDF show "-:--".
            const isBM = best.family === "BM";
            const isBMHigh = isBM && pOut_bar != null && pOut_bar > 48;   // BM with rack regime
            // The cylinder-rack regime applies for BON2 (any pOut) and BM > 48 bar,
            // but only when the user has enabled the storage add-on toggle.
            const cylRegime = isBON2 || isBMHigh;
            const cylApplies = cylRegime && addonEnabled;
            const cylFill = (() => {
              if (!cylApplies) return null;
              const N = parseInt(cylN, 10);
              const V_L = parseFloat(cylV);
              if (!Number.isFinite(N) || !Number.isFinite(V_L) || N <= 0 || V_L <= 0) return null;
              if (pOut_bar == null || pOut_bar <= 0) return null;
              // Restart pressure: default 250 barg, capped to (pOut − 1) so it stays
              // strictly below discharge.  If pOut ≤ 1, fall back to 0.
              const pRestartDefault = Math.min(250, Math.max(0, pOut_bar - 1));
              const pStart_bar = (cylRestart === "" || cylRestart == null)
                ? pRestartDefault
                : (() => { const v = parseFloat(cylRestart);
                           return Number.isFinite(v) && v >= 0 && v < pOut_bar ? v : pRestartDefault; })();
              // Customer flow consumption from the rack (m³/h FAD).  Empty/invalid → 0.
              const consumed_m3h = (() => {
                if (cylConsumed === "" || cylConsumed == null) return 0;
                const v = parseFloat(cylConsumed);
                return Number.isFinite(v) && v >= 0 ? v : 0;
              })();
              // Booster FAD (use buffer-cycle average when buffer ON, else steady-state).
              const fad_m3h = (bf && effectiveBufferOn && bf.fadAvg != null) ? bf.fadAvg
                            : (best.fadTotal != null ? best.fadTotal : null);
              if (fad_m3h == null || fad_m3h <= 0) return null;
              // Net flow into the rack = booster delivered − customer consumption.
              const fadNet_m3h = fad_m3h - consumed_m3h;
              const eV = result.etaV || 0.95;

              // Full fill (assumes empty cylinders → pOut). Cannot complete when
              // consumption ≥ delivered.
              const dP_full = pOut_bar - 0;
              const totalAir_m3 = (N * V_L / 1000) * dP_full / eV;
              const t_h_full = (fadNet_m3h > 0) ? (totalAir_m3 / fadNet_m3h) : Infinity;

              // Refill from pStart → pOut (operational restart cycle).
              const dP_refill = pOut_bar - pStart_bar;
              const refillAir_m3 = (N * V_L / 1000) * dP_refill / eV;
              const t_h_refill = (fadNet_m3h > 0) ? (refillAir_m3 / fadNet_m3h) : Infinity;

              return { N, V_L, totalAir_m3, fad_m3h,
                       consumed_m3h, fadNet_m3h,
                       t_s: t_h_full === Infinity ? Infinity : t_h_full * 3600,
                       pStart_bar, pRestartDefault,
                       t_s_refill: t_h_refill === Infinity ? Infinity : t_h_refill * 3600,
                       refillAir_m3 };
            })();

            // ─────────────────────────────────────────────────────────────────────
            //  BM family, pOut ≤ 48 bar  →  DELIVERY TANK ("serbatoio di mandata")
            //  parallel UX to the cylinder-rack regime (BON2 / BM > 48 bar).  User
            //  picks the tank volume from {500,1000,1500,2000,3000} L and the
            //  restart pressure (default = pOut − 5 bar).  We then compute:
            //    - fill time from empty (0 → pOut)
            //    - refill time (pStart → pOut, with the booster pushing fad_net)
            //    - empty time (pOut → pStart, customer alone draining at Q)  — only
            //      shown when the customer demand Q is specified.
            //    - starts/h = 60 / (t_refill_min + t_empty_min)               — same.
            //
            //  Volumetric formulas (single tank, mirror of cylinder rack with N=1):
            //    t_fill[h]   = V[L]/1000 · pOut[bar]              / FAD_net / etaV
            //    t_refill[h] = V[L]/1000 · (pOut − pStart)        / FAD_net / etaV
            //    t_empty[h]  = V[L]/1000 · (pOut − pStart)        / Q_consumed
            //    starts/h    = 60 / (t_refill_min + t_empty_min)  = 1 / T_cycle_h
            //
            //  Constraints:
            //    pStart < pOut       (caller-side validation, fallback to default)
            //    Q < FAD_booster     (otherwise refill never completes → "-:--")
            // ─────────────────────────────────────────────────────────────────────
            const isBMLow = isBM && pOut_bar != null && pOut_bar > 0 && pOut_bar <= 48;
            const dlvRegime = isBMLow;
            const dlvApplies = dlvRegime && addonEnabled;
            const dlvTank = (() => {
              if (!dlvApplies) return null;
              const fad_m3h = best.fadTotal;
              if (fad_m3h == null || fad_m3h <= 0) return null;

              // Tank volume — selectable from DLV_TANK_SIZES, default 1000 L
              const V_L_raw = parseFloat(dlvV);
              const V_L = (Number.isFinite(V_L_raw) && DLV_TANK_SIZES.includes(V_L_raw))
                ? V_L_raw : 1000;

              // Restart pressure — default = pOut − 5 bar, never above pOut − 1.
              // If the user typed something invalid (>= pOut, negative, NaN), we
              // surface that via `restartInvalid` so the UI can warn but we still
              // compute on the safe default to avoid blank KPIs.
              const pRestartDefault = Math.max(0, Math.min(pOut_bar - 1, pOut_bar - 5));
              let restartInvalid = false;
              const pStart_bar = (() => {
                if (dlvRestart === "" || dlvRestart == null) return pRestartDefault;
                const v = parseFloat(dlvRestart);
                if (!Number.isFinite(v) || v < 0)         { restartInvalid = true; return pRestartDefault; }
                if (v >= pOut_bar)                         { restartInvalid = true; return pRestartDefault; }
                return v;
              })();

              // Customer demand from the tank (m³/h FAD).  Empty/invalid → null
              // (we keep "qSet" so we know whether to display empty-time / starts).
              const qSet = !(dlvConsumed === "" || dlvConsumed == null);
              const consumed_m3h = (() => {
                if (!qSet) return 0;
                const v = parseFloat(dlvConsumed);
                return Number.isFinite(v) && v >= 0 ? v : 0;
              })();
              const overDemand = qSet && consumed_m3h >= fad_m3h;

              const fadNet_m3h = Math.max(0, fad_m3h - consumed_m3h);
              const eV = result.etaV || 0.90;   // BM family: 0.90

              // V[m³] · ΔP[bar]  (Nm³ at standard conditions; the formula already
              // accounts for the pressure ratio because pOut is in bar gauge ≈ bar abs at high p).
              const dP_full   = pOut_bar;
              const dP_refill = Math.max(0, pOut_bar - pStart_bar);
              const t_h_full   = (fadNet_m3h > 0) ? ((V_L/1000) * dP_full   / fadNet_m3h / eV) : Infinity;
              const t_h_refill = (fadNet_m3h > 0) ? ((V_L/1000) * dP_refill / fadNet_m3h / eV) : Infinity;
              // Empty time uses customer Q only (booster is OFF).  No etaV here —
              // it's a pure release of stored air through the consumer port.
              const t_h_empty  = (qSet && consumed_m3h > 0)
                ? ((V_L/1000) * dP_refill / consumed_m3h)
                : null;

              // Starts/h = 60 / (t_refill_min + t_empty_min)  (only when Q set)
              const startsPerH = (qSet && consumed_m3h > 0
                                  && Number.isFinite(t_h_refill) && t_h_refill > 0
                                  && Number.isFinite(t_h_empty)  && t_h_empty  > 0)
                ? 60 / (t_h_refill * 60 + t_h_empty * 60)
                : null;

              return {
                V_L, fad_m3h, consumed_m3h, fadNet_m3h, qSet, overDemand,
                pStart_bar, pRestartDefault, restartInvalid,
                t_s_full:   t_h_full   === Infinity ? Infinity : t_h_full   * 3600,
                t_s_refill: t_h_refill === Infinity ? Infinity : t_h_refill * 3600,
                t_s_empty:  t_h_empty  == null      ? null     : t_h_empty  * 3600,
                startsPerH,
              };
            })();

            // Time formatter: h:mm for >= 1 h, MM:SS for >= 1 min, else seconds.
            // Always shows at least 2 digits for the minor unit.
            const fmtTime = (sec) => {
              if (sec == null) return "—";
              if (!Number.isFinite(sec)) return "-:-- h";   // unreachable refill (consumption ≥ FAD)
              if (sec < 60) return sec.toFixed(0) + " s";
              if (sec < 3600) {
                const m = Math.floor(sec/60);
                const s = Math.round(sec - m*60);
                return s === 0 ? `${m} min` : `${m}:${String(s).padStart(2,"0")} min`;
              }
              const h = Math.floor(sec/3600);
              const m = Math.round((sec - h*3600)/60);
              if (m === 60) return `${h+1}:00 h`;
              return `${h}:${String(m).padStart(2,"0")} h`;
            };
            const fmtVol = (L) => {
              if (units === "imperial") return fmt(L / GAL_TO_L, 0) + " gal";
              return L + " L";
            };

            if (bf && effectiveBufferOn) {
              const overrideL = selectedBufferSize;
              newBuf = computeBufferNew(Q_utente_inlet, bf.qInletAvg, dP_inlet, units);
              // Se l'utente ha selezionato una taglia manualmente, ricalcola i tempi
              if (newBuf && overrideL != null && overrideL !== newBuf.volume_L) {
                const dQ = bf.qInletAvg - Q_utente_inlet;
                const F2 = 1000/60;
                if (dQ > 0) {
                  const tF = overrideL * dP_inlet / (Q_utente_inlet * F2) * 60;
                  const tE = overrideL * dP_inlet / (dQ * F2) * 60;
                  newBuf = { ...newBuf, volume_L: overrideL, tFill_s: tF, tEmpty_s: tE, tCycle_s: tF+tE, startsPerHour: 3600/(tF+tE) };
                }
              }
            }

            // Taglie valide (≤ 8 avv/h) per il selettore volume
            const validSizesL = (() => {
              if (!bf || !effectiveBufferOn) return [];
              const dQ = bf.qInletAvg - Q_utente_inlet;
              if (dQ <= 0) return [];
              const sizes = units === "imperial"
                ? BUFFER_SIZES_GAL.map(g => Math.round(g * GAL_TO_L))
                : BUFFER_SIZES_L;
              // startsPerHour = 60×F / (L × dP × (1/Qs + 1/dQ))
              const F2 = 1000/60;
              const k = dP_inlet * (1/Q_utente_inlet + 1/dQ);
              return sizes.filter(L => 60*F2/(L*k) <= MAX_STARTS_PER_HOUR + 0.001);
            })();

            // ── Synoptic helpers ──
            const showIntakeSyn = selectedFamily !== "CM" && selectedFamily !== "CNG";
            const arrowSvg = (
              <div className="syn-arrow">
                <svg width="50" height="32" viewBox="0 0 50 32">
                  <line className="arr-line" x1="2" y1="16" x2="36" y2="16" stroke="var(--accent)" strokeWidth="2.5" strokeLinecap="round"/>
                  <polyline points="30,10 45,16 30,22" fill="none" stroke="var(--accent)" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
                </svg>
              </div>
            );
            const reducerSvg = best.reducerUpstream != null ? (
              <div className="syn-reducer">
                {/* P&ID pressure-reducing valve — horizontal flow (left→right), dome actuator on top */}
                <svg width="54" height="52" viewBox="0 0 54 52">
                  {/* Left pipe stub */}
                  <line x1="0" y1="28" x2="11" y2="28" stroke="var(--beige-dark)" strokeWidth="1.8" strokeLinecap="round"/>
                  {/* Left seat bar */}
                  <line x1="11" y1="18" x2="11" y2="38" stroke="var(--beige-dark)" strokeWidth="1.8" strokeLinecap="round"/>
                  {/* Left triangle (pointing right) */}
                  <polygon points="11,18 11,38 27,28" fill="var(--bg)" stroke="var(--beige-dark)" strokeWidth="1.5" strokeLinejoin="round"/>
                  {/* Right triangle (pointing left) */}
                  <polygon points="43,18 43,38 27,28" fill="var(--bg)" stroke="var(--beige-dark)" strokeWidth="1.5" strokeLinejoin="round"/>
                  {/* Right seat bar */}
                  <line x1="43" y1="18" x2="43" y2="38" stroke="var(--beige-dark)" strokeWidth="1.8" strokeLinecap="round"/>
                  {/* Right pipe stub */}
                  <line x1="43" y1="28" x2="54" y2="28" stroke="var(--beige-dark)" strokeWidth="1.8" strokeLinecap="round"/>
                  {/* Stem from valve centre to diaphragm plate */}
                  <line x1="27" y1="28" x2="27" y2="17" stroke="var(--beige-dark)" strokeWidth="1.5" strokeLinecap="round"/>
                  {/* Diaphragm plate (base of dome) */}
                  <line x1="14" y1="17" x2="40" y2="17" stroke="var(--beige-dark)" strokeWidth="1.5" strokeLinecap="square"/>
                  {/* Dome: semicircle arch upward from diaphragm plate */}
                  <path d="M 14 17 A 13 9 0 0 0 40 17 Z" fill="var(--bg)" stroke="var(--beige-dark)" strokeWidth="1.5"/>
                  {/* PR label */}
                  <text x="27" y="50" fontSize="8" fill="var(--beige-dark)" textAnchor="middle" fontWeight="700">PR</text>
                </svg>
                <div className="syn-reducer-lbl">{fmtP(best.reducerUpstream)}</div>
              </div>
            ) : null;

            // PDF generation
            const handlePDF = () => {
              const jsPDF = window.jspdf ? window.jspdf.jsPDF : (window.jsPDF || null);
              if (!jsPDF) { alert("PDF non disponibile"); return; }
              const doc = new jsPDF({unit:"mm", format:"a4"});
              const W = 210, margin = 18, contentW = W - 2*margin;
              let y = 16;
              const ln = (h=5) => { y += h; };
              const hrLine = (col) => { doc.setDrawColor(...(col||[220,220,220])); doc.line(margin,y,W-margin,y); };

              // PDF labels: jsPDF default font is winAnsi only — fall back to English
              // for non-Latin scripts so glyphs do not turn into garbage.
              const pdfLang = (["ru","zh","ar"].includes(lang)) ? "en" : lang;
              const tt = T[pdfLang];
              const pp = PDF_LABELS[pdfLang];

              // Flows at balance pressure (works whether bf exists or not).
              // At equilibrium, machine aspirated flow = network supply by definition.
              const flowsAtBalance = (() => {
                if (!showBalance || best.pEqGauge == null) return null;
                if (bf) return { qInletAtEq: bf.qInletAtEq, fadAtEq: bf.fadAtEq, pEq: bf.pEqGauge };
                const fad = (best.fadFn) ? best.fadFn(best.pEqGauge) * (best.n || 1) : null;
                return { qInletAtEq: result.qInletRequested, fadAtEq: fad, pEq: best.pEqGauge };
              })();

              // ── Page header ──
              // Logo top-left — actual image is 1168x431 px (aspect ≈ 2.71:1)
              try { doc.addImage(LOGO_DATA_URI, 'JPEG', margin, 10, 30, 11); } catch(e){}
              // Title centre — official report header
              doc.setFont("helvetica","bold"); doc.setFontSize(15); doc.setTextColor(232,93,46);
              doc.text("NARDI INDUSTRY SIZING REPORT", W/2, 20, {align:"center"});
              // Date top-right
              doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(120,120,120);
              doc.text(new Date().toLocaleDateString(), W-margin, 30, {align:"right"});
              y = 36;
              hrLine([232,93,46]); ln(4);
              doc.setDrawColor(220,220,220);

              // Section/row helpers (defined early so they are usable before the schema).
              // Spacings tuned for SINGLE-PAGE layout: row pitch 4.6 mm and section gaps
              // 2/3 mm so the Master/Slave footer block always fits below the scenario rows.
              const sHead = (txt) => {
                doc.setFont("helvetica","bold"); doc.setFontSize(11); doc.setTextColor(232,93,46);
                doc.text(txt, margin, y); ln(5);
                doc.setFont("helvetica","normal"); doc.setFontSize(9); doc.setTextColor(50,50,50);
              };
              const row = (label, value) => {
                doc.text(label+":", margin, y); doc.text(String(value), margin+78, y); ln(4.6);
              };

              // ── 1) Input data ──
              sHead(pp.inputData);
              if (showIntakeSyn) row(tt.intakeP, fmtP(pIn_bar));
              row(tt.dischP, fmtP(pOut_bar));
              row(flowType==="aspirated" ? pp.reqAsp : pp.reqDel,
                  fmtF(flowType==="aspirated" ? result.qInletRequested : result.fadRequested));
              ln(2); hrLine(); ln(3);

              // ── 2) Synoptic schema ──
              const schW = contentW, schX = margin;
              const schY = y;
              const schH = (bf && effectiveBufferOn) ? 40 : 32;
              doc.setFillColor(250,248,246); doc.roundedRect(schX, schY, schW, schH, 2, 2, 'F');
              const midY = schY + schH/2;

              // Left: intake pressure + flow
              doc.setFont("helvetica","normal"); doc.setFontSize(8); doc.setTextColor(80,80,80);
              const leftTxt = showIntakeSyn ? [fmtP(pIn_bar), fmtF(result.qInletRequested)] : [fmtF(result.qInletRequested)];
              leftTxt.forEach((t2,i) => doc.text(t2, schX+5, midY - (leftTxt.length-1)*3.5 + i*7, {align:"left"}));

              // Helper: draw P&ID pressure-reducing valve in PDF (horizontal flow)
              const drawPRvalve = (cx, cy) => {
                const hw=3.5, hh=3.2, stH=2.5, dH=2.2;
                doc.setDrawColor(130,85,30); doc.setFillColor(250,245,235); doc.setLineWidth(0.5);
                // Left pipe + seat
                doc.line(cx-hw-3, cy, cx-hw, cy);
                doc.line(cx-hw, cy-hh, cx-hw, cy+hh);
                // Left triangle (fills left half of valve body)
                doc.triangle(cx-hw,cy-hh, cx-hw,cy+hh, cx,cy, 'FD');
                // Right triangle
                doc.triangle(cx+hw,cy-hh, cx+hw,cy+hh, cx,cy, 'FD');
                // Right seat + pipe
                doc.line(cx+hw, cy-hh, cx+hw, cy+hh);
                doc.line(cx+hw, cy, cx+hw+3, cy);
                // Stem
                doc.line(cx, cy, cx, cy-stH);
                // Diaphragm plate
                doc.line(cx-hw+0.5, cy-stH, cx+hw-0.5, cy-stH);
                // Dome (approximated as filled ellipse above diaphragm)
                doc.setFillColor(250,245,235);
                doc.ellipse(cx, cy-stH-dH, hw-0.5, dH, 'FD');
                // "PR" label below
                doc.setFont("helvetica","bold"); doc.setFontSize(5.5); doc.setTextColor(130,85,30);
                doc.text("PR", cx, cy+hh+3.5, {align:"center"});
              };

              // Helper: draw stylized cylinder rack (gas cylinder pack) for the PDF schema.
              // (x,y) top-left, w×h total bounding box (mm).
              const drawCylinderRackPDF = (doc, x, y, w, h) => {
                const N = 5;                          // number of visible cylinder columns
                const cylW = w * 0.12;                // each cylinder body width
                const cylSp = (w - N*cylW) / (N+1);   // gap between cylinders
                const cageTop = h * 0.32;             // where cage frame begins
                const cageBot = h * 0.92;             // bottom of cage (feet below)
                const cylTopY = h * 0.06;             // top of cylinder valve

                // 1) Cylinders (visible above cage)
                for (let i = 0; i < N; i++) {
                  const cx = x + cylSp + i*(cylW+cylSp) + cylW/2;
                  // Body (metallic gray)
                  doc.setFillColor(170,175,180); doc.setDrawColor(70,70,75); doc.setLineWidth(0.25);
                  doc.rect(cx-cylW/2, y+cylTopY+1.6, cylW, cageTop-cylTopY-1.0, 'FD');
                  // Shoulder cap (industrial color – green for nitrogen-style)
                  doc.setFillColor(45,120,70); doc.setDrawColor(25,80,45);
                  doc.ellipse(cx, y+cylTopY+1.6, cylW/2, 0.7, 'FD');
                  // Valve neck (dark)
                  doc.setFillColor(70,70,70);
                  doc.rect(cx-cylW/3, y+cylTopY+0.4, (cylW/3)*2, 1.3, 'F');
                  // Valve handle dot
                  doc.setFillColor(180,50,40);
                  doc.ellipse(cx, y+cylTopY+0.4, cylW/3, 0.35, 'F');
                }

                // 2) Cage frame (outline)
                doc.setDrawColor(110,110,110); doc.setLineWidth(0.6);
                doc.rect(x, y+cageTop, w, cageBot-cageTop, 'S');

                // 3) Steel front panel (lower portion of cage – tread plate)
                const panelTop = y + cageTop + (cageBot-cageTop)*0.42;
                const panelBot = y + cageBot;
                doc.setFillColor(205,205,210); doc.setDrawColor(120,120,125); doc.setLineWidth(0.4);
                doc.rect(x+0.6, panelTop, w-1.2, panelBot-panelTop, 'FD');
                // Two oval handle slots in the plate
                doc.setFillColor(80,80,80);
                doc.ellipse(x + w*0.30, (panelTop+panelBot)/2, w*0.07, 0.55, 'F');
                doc.ellipse(x + w*0.70, (panelTop+panelBot)/2, w*0.07, 0.55, 'F');

                // 4) Side cage mesh (small X-pattern on left and right above the panel)
                doc.setDrawColor(140,140,140); doc.setLineWidth(0.22);
                const meshTop = y+cageTop + 0.6, meshBot = panelTop - 0.4;
                const rows = 3, dy = (meshBot-meshTop)/rows;
                for (let i = 0; i < rows; i++) {
                  const yt = meshTop + i*dy, yb = yt + dy;
                  // left panel (between x and x+3)
                  doc.line(x+0.6, yt, x+3, yb); doc.line(x+3, yt, x+0.6, yb);
                  // right panel (between x+w-3 and x+w)
                  doc.line(x+w-3, yt, x+w-0.6, yb); doc.line(x+w-0.6, yt, x+w-3, yb);
                }

                // 5) Feet (under cage)
                doc.setFillColor(100,100,100); doc.setDrawColor(70,70,75); doc.setLineWidth(0.3);
                doc.rect(x+0.5, y+cageBot, 2.5, h-cageBot, 'F');
                doc.rect(x+w-3, y+cageBot, 2.5, h-cageBot, 'F');
              };

              // ── Tank drawing for the PDF schematic ───────────────────────────
              // Faithful 1:1 port of the app's tankSvg (38×78 viewBox) so the PDF
              // matches what the user sees on screen (per request: "metti lo
              // stesso disegno del buffer che vedo nell'app, non alterarlo").
              //   - Used for BOTH buffer (withFill=true, has central blue fill
              //     ellipse) and delivery tank (withFill=false, no fill ellipse —
              //     "senza il cerchietto blu nel mezzo").
              //   - (x, y) = top-left of the bounding box (mm); (w, h) = scaled
              //     size — defaults preserve the on-screen aspect ratio.
              const drawTankPDF = (doc, x, y, w, h, withFill) => {
                const sx = w / 38, sy = h / 78;       // scale factors viewBox → mm
                const tx = (vx) => x + vx * sx;
                const ty = (vy) => y + vy * sy;
                // Top cap (light blue ellipse, drawn first so the body covers
                // its lower half — same z-order as the app SVG).
                doc.setFillColor(208, 228, 247); doc.setDrawColor(59, 122, 201); doc.setLineWidth(0.4);
                doc.ellipse(tx(19), ty(10), 16 * sx, 5 * sy, 'FD');
                // Body (rounded rect for a slightly softer look at small sizes).
                doc.setFillColor(232, 242, 252);
                doc.rect(tx(3), ty(10), 32 * sx, 54 * sy, 'FD');
                // Bottom cap (slightly darker — perspective shadow).
                doc.setFillColor(196, 216, 240);
                doc.ellipse(tx(19), ty(64), 16 * sx, 5 * sy, 'FD');
                // Dashed gauge line at mid-height.  jsPDF's setLineDashPattern is
                // available in v2; if unavailable we fall back to a solid thin line.
                doc.setDrawColor(59, 122, 201); doc.setLineWidth(0.2);
                if (typeof doc.setLineDashPattern === "function") {
                  doc.setLineDashPattern([0.7, 0.5], 0);
                  doc.line(tx(3), ty(38), tx(35), ty(38));
                  doc.setLineDashPattern([], 0);
                } else {
                  doc.line(tx(3), ty(38), tx(35), ty(38));
                }
                // Central fill-level ellipse — buffer ONLY (omitted for delivery).
                if (withFill) {
                  doc.setFillColor(160, 196, 232); doc.setDrawColor(59, 122, 201); doc.setLineWidth(0.3);
                  doc.ellipse(tx(19), ty(38), 16 * sx, 4.5 * sy, 'FD');
                }
              };

              const hasReducer = best.reducerUpstream != null;
              // Space reserved for PR symbol: 14mm (left-pipe+valve+right-pipe), plus 4mm gap each side = 22mm total
              const prReserve = hasReducer ? 22 : 0;
              // Cylinder-rack reservation (only when BON2 + cylinder fill section is active).
