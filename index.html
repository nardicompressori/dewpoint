<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#CC0000">
<link rel="preload" href="logo.png" as="image">

<title>Nardi Compressori – Dew Point Calculator</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#CC0000;--bg:#f0f0f0;--white:#fff;
  --text:#1a1a1a;--t2:#555;--t3:#888;
  --bdr:#ddd;--bdr2:#e4e4e4;--gray:#f5f5f5;
  --font:'Segoe UI',system-ui,sans-serif;
  --mono:'Courier New',monospace;
  --r:3px;
}

html,body{
  height:100%;
  background:var(--bg);
  -webkit-text-size-adjust:100%;
}

body{
  font-family:var(--font);
  color:var(--text);
  display:flex;
  flex-direction:column;
  font-size:13px;
  overflow-x:hidden;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

/* HEADER */
.hdr{
  background:#fff;border-bottom:3px solid var(--red);
  display:flex;align-items:center;height:50px;
}

.hdr-logo{
  padding:6px 14px;
  border-right:1px solid var(--bdr2);
  display:flex;align-items:center;
}

.hdr-title{flex:1;text-align:center}
.hdr-title h1{font-size:.88rem;font-weight:800}
.hdr-title p{font-size:.58rem;color:var(--t3)}

.hdr-ctrls{display:flex;gap:7px;padding:0 12px}

/* INPUT */
.inp-wrap input{
  width:100%;
  padding:6px;
  font-size:.95rem;
  font-family:var(--mono);
}

/* CANVAS */
canvas{
  touch-action:none;
}

/* MOBILE */
@media(max-width:640px){
  .hdr{height:44px}
  .hdr-logo img{height:30px}
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-logo">
    <img src="logo.png" alt="Nardi Compressori"
         style="height:36px; display:block;"
         decoding="async">
  </div>

  <div class="hdr-title">
    <h1 id="hdr-t">CALCOLATORE PUNTO DI RUGIADA</h1>
    <p id="hdr-s">Analisi Umidità Aria Compressa</p>
  </div>
</div>

<!-- INPUT -->
<div style="padding:10px">
  <input type="number" id="iP" value="200" step="1" inputmode="decimal"><br><br>
  <input type="number" id="iT" value="-40" step="0.5" inputmode="decimal"><br><br>
  <input type="number" id="iG" value="20" step="1" inputmode="decimal">
</div>

<!-- CANVAS -->
<canvas id="dpCanvas"></canvas>

<script>

/* TOOLTIP CACHE */
const tt = document.getElementById('tip');

/* DEBOUNCE */
let tmr=null;
function debounceUpdate(){
  clearTimeout(tmr);
  tmr=setTimeout(update,120);
}

/* INPUT LISTENER */
['iP','iT','iG'].forEach(id=>{
  document.getElementById(id).addEventListener('input',debounceUpdate);
});

/* CALCOLO */
function compute(){
  let pts=[];
  for(let i=0;i<=250;i++){
    const p=500*i/250;
    pts.push(p);
  }
  return pts;
}

/* CANVAS */
const cv=document.getElementById('dpCanvas');
const ct=cv.getContext('2d');

function resize(){
  const dpr=window.devicePixelRatio||1;
  cv.width=window.innerWidth*dpr;
  cv.height=300*dpr;

  ct.setTransform(1,0,0,1,0,0);
  ct.scale(dpr,dpr);

  draw();
}

function draw(){
  ct.clearRect(0,0,cv.width,cv.height);
  ct.beginPath();

  const pts=compute();
  pts.forEach((p,i)=>{
    const x=i*2;
    const y=150 - Math.sin(i/10)*50;
    if(i===0) ct.moveTo(x,y);
    else ct.lineTo(x,y);
  });

  ct.strokeStyle="#CC0000";
  ct.lineWidth=2;
  ct.stroke();
}

/* UPDATE */
function update(){
  draw();
}

/* INIT */
window.addEventListener('resize',resize);
resize();

</script>

</body>
</html>
